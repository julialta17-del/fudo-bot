<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIG SALADS · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #f0ede6;
  --bg1:        #e8e4db;
  --white:      #ffffff;
  --card:       #ffffff;
  --green:      #2a7d40;
  --green2:     #3a9e52;
  --green3:     #5dbf72;
  --green-bg:   #e8f5ec;
  --green-dark: #1a5430;
  --orange:     #e05a1a;
  --orange-bg:  #fef0e8;
  --yellow:     #f5c030;
  --yellow-bg:  #fef8e0;
  --red:        #d94040;
  --red-bg:     #fde8e8;
  --text:       #1a2e1e;
  --text2:      #3a5040;
  --muted:      #7a9a82;
  --border:     #c8dcc8;
  --border2:    #a8c8a8;
  --shadow:     0 2px 12px rgba(42,125,64,0.08);
  --shadow-lg:  0 8px 32px rgba(42,125,64,0.12);
  --bebas: 'Bebas Neue', cursive;
  --sans:  'Outfit', sans-serif;
  --mono:  'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 400;
  min-height: 100vh;
}

header {
  position: sticky; top: 0; z-index: 100;
  background: var(--green-dark);
  padding: 0 36px;
  display: flex; align-items: center; justify-content: space-between;
  height: 68px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.2);
}

.brand { display: flex; align-items: center; gap: 14px; }
.brand-logo {
  width: 42px; height: 42px; border-radius: 10px;
  background: var(--green2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  border: 2px solid rgba(255,255,255,0.2);
}
.brand-name {
  font-family: var(--bebas);
  font-size: 26px; letter-spacing: 2px;
  color: #ffffff; line-height: 1;
}
.brand-name span { color: var(--green3); }
.brand-sub {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.45); margin-top: 2px;
}

.header-right { display: flex; align-items: center; gap: 10px; }

.status-pill {
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 999px; padding: 7px 14px;
  font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.6);
}
.dot { width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3); transition:all 0.3s; }
.dot.ok { background:#6be082; box-shadow:0 0 8px #6be082; }

.btn {
  display:inline-flex;align-items:center;gap:6px;
  border:none;border-radius:8px;cursor:pointer;
  font-family:var(--mono);font-size:11px;font-weight:500;
  padding:9px 16px; transition:all 0.15s; white-space:nowrap;
}
.btn-white { background:#fff;color:var(--green-dark); }

main {
  padding: 28px 36px 60px;
  display:flex;flex-direction:column;gap:28px;
  max-width:1600px;margin:0 auto;
}

.sec {
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.sec-title {
  font-family:var(--bebas);font-size:18px;letter-spacing:2px;color:var(--green-dark);
  white-space:nowrap;
}
.sec-line { flex:1;height:1px;background:var(--border); }
.sec-note { font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap; }

.kpi-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.kpi {
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;padding:20px 18px;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
  transition:transform 0.18s,box-shadow 0.18s;
}
.kpi:hover { transform:translateY(-2px);box-shadow:var(--shadow-lg); }
.kpi::before {
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--kc,var(--green)); border-radius:3px 3px 0 0;
}
.kpi[data-c=yellow] { --kc:var(--yellow); }

.kpi-lbl { font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted); }
.kpi-val {
  font-family:var(--bebas);font-size:40px;letter-spacing:1px;
  color:var(--text);line-height:1.05;margin:4px 0 2px;
}
.kpi-val .u { font-size:22px;color:var(--muted); }
.chip {
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 8px;border-radius:999px;
  font-family:var(--mono);font-size:10px;margin-top:5px;
  background:var(--yellow-bg);color:#8a6a00;
}

@media(max-width:900px){
  header,main{padding-left:18px;padding-right:18px;}
  .kpi-grid{grid-template-columns: 1fr;}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">🥗</div>
    <div class="brand-text">
      <div class="brand-name">BIG <span>SALADS</span></div>
      <div class="brand-sub">Dashboard · Análisis de ventas</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="dot ok"></div>
      <span id="stTxt">Actualizado</span>
    </div>
    <button class="btn btn-white" onclick="location.reload()">ACTUALIZAR</button>
  </div>
</header>

<main>
  <div>
    <div class="sec">
      <div class="sec-title">RESUMEN DEL DÍA</div>
      <div class="sec-line"></div>
      <div class="sec-note">8 ventas hoy</div>
    </div>
    <div class="kpi-grid">
      <div class="kpi" data-c="green">
        <div class="kpi-lbl">VENTAS TOTALES</div>
        <div class="kpi-val"><span class="u">$</span>129.420</div>
        <div class="chip" style="background:var(--green-bg); color:var(--green);">Ventas de hoy</div>
      </div>

      <div class="kpi" data-c="green">
        <div class="kpi-lbl">EN MANO (MARGEN NETO)</div>
        <div class="kpi-val"><span class="u">$</span>78.062</div>
        <div class="chip">60.3% del total</div>
      </div>

      <div class="kpi" data-c="yellow">
        <div class="kpi-lbl">TICKET PROMEDIO</div>
        <div class="kpi-val"><span class="u">$</span>16.178</div>
        <div class="chip" style="background:var(--yellow-bg); color:#8a6a00;">8 ventas realizadas</div>
      </div>
    </div>
  </div>
</main>

</body>
</html>
