<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG SALADS Sexta · Management Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root { --green: #2a7d40; --light: #5dbf72; --dark: #12331c; --bg: #f4f7f4; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        /* Login impecable */
        #auth-screen { position: fixed; inset: 0; background: var(--dark); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.05); padding: 50px; border-radius: 30px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .btn-login { background: var(--light); color: white; border: none; padding: 18px 40px; border-radius: 15px; font-family: 'Bebas Neue'; font-size: 26px; cursor: pointer; transition: 0.3s; width: 100%; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-login:hover { transform: translateY(-3px); background: #4ca65f; }

        header { background: var(--dark); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo { font-family: 'Bebas Neue'; font-size: 32px; letter-spacing: 1px; }
        .logo span { color: var(--light); }

        .tabs { background: white; display: flex; padding: 0 30px; gap: 20px; border-bottom: 1px solid #ddd; }
        .tab { padding: 20px 10px; cursor: pointer; font-family: 'Bebas Neue'; font-size: 18px; color: #999; position: relative; transition: 0.3s; }
        .tab.active { color: var(--green); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--green); border-radius: 2px 2px 0 0; }

        main { padding: 30px; max-width: 1400px; margin: 0 auto; display: none; }
        main.active { display: block; animation: fadeIn 0.5s; }

        /* KPIs Estilo "Premium" */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); position: relative; overflow: hidden; border: 1px solid #eee; }
        .kpi::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 8px; background: var(--green); }
        .kpi-lbl { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .kpi-val { font-family: 'Bebas Neue'; font-size: 45px; color: var(--dark); line-height: 1; }
        .kpi-sub { font-size: 13px; margin-top: 10px; color: var(--green); font-weight: 600; }

        .chart-container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #eee; margin-bottom: 30px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <div class="logo">BIG SALADS <span>SEXTA</span></div>
        <p style="color: rgba(255,255,255,0.6); margin-top: 10px; font-size: 14px;">GESTIÓN ESTRATÉGICA DE VENTAS</p>
        <button class="btn-login" id="authorize_button">ENTRAR AL SISTEMA</button>
    </div>
</div>

<header>
    <div class="logo">BIG SALADS <span>HUB</span></div>
    <div id="sync-status" style="font-size: 12px; color: var(--light);">● DATOS SINCRONIZADOS</div>
</header>

<div class="tabs">
    <div class="tab active" onclick="setTab('Hoja 1', this)">RESUMEN DIARIO</div>
    <div class="tab" onclick="setTab('Historico', this)">ANÁLISIS HISTÓRICO</div>
</div>

<main id="main-content">
    <div class="kpi-grid" id="kpi-container"></div>
    <div class="chart-container">
        <div style="font-family: 'Bebas Neue'; font-size: 24px; margin-bottom: 20px; color: var(--dark);">TENDENCIA DE VENTAS</div>
        <canvas id="mainChart" height="120"></canvas>
    </div>
</main>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

<script>
    // PEGA TUS CREDENCIALES AQUÍ
    const CLIENT_ID = '89958085370-j4jbkoa7t3u4o0obr5erg3j9h3nrcif3g.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyAVQoifZYh3oc2T1p9xMYKNhe_XtIYQjYc'; 
    const SPREADSHEET_ID = '1uEFRm_0zEhsRGUX9PIomjUhiijxWVnCXnSMQuUJK5a8';

    let gapiInited = false, gisInited = false, tokenClient, activeSheet = 'Hoja 1', myChart = null;

    function gapiLoaded() { gapi.load('client', async () => {
        await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"] });
        gapiInited = true; checkAuth();
    });}
    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
            callback: (resp) => { if (resp.access_token) { document.getElementById('auth-screen').style.display = 'none'; loadData(); } }
        });
        gisInited = true; checkAuth();
    }
    function checkAuth() { if (gapiInited && gisInited) document.getElementById('authorize_button').onclick = () => tokenClient.requestAccessToken(); }

    async function loadData() {
        document.getElementById('sync-status').innerText = '○ CARGANDO...';
        try {
            const range = activeSheet === 'Hoja 1' ? 'Hoja 1!A1:Z100' : 'Historico!A1:Z5000';
            const resp = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: SPREADSHEET_ID, range: range });
            processData(resp.result.values);
        } catch (e) { console.error(e); }
        document.getElementById('sync-status').innerText = '● DATOS SINCRONIZADOS';
        document.getElementById('main-content').classList.add('active');
    }

    function processData(rows) {
        const headers = rows[0];
        const data = rows.slice(1).filter(r => r[0]);
        const parse = v => parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;
        const fmt = v => new Intl.NumberFormat('es-AR', {style:'currency', currency:'ARS', maximumFractionDigits:0}).format(v);

        const idx = {
            total: headers.findIndex(h => h.toLowerCase().includes('total')),
            margen: headers.findIndex(h => h.toLowerCase().includes('margen')),
            fecha: headers.findIndex(h => h.toLowerCase().includes('fecha'))
        };

        const totalVenta = data.reduce((a, b) => a + parse(b[idx.total]), 0);
        const totalMargen = data.reduce((a, b) => a + parse(b[idx.margen]), 0);
        const rentabilidad = (totalMargen / totalVenta) * 100 || 0;

        // Render KPIs
        document.getElementById('kpi-container').innerHTML = `
            <div class="kpi">
                <div class="kpi-lbl">${activeSheet === 'Hoja 1' ? 'VENTA DEL DÍA' : 'VENTA HISTÓRICA TOTAL'}</div>
                <div class="kpi-val">${fmt(totalVenta)}</div>
                <div class="kpi-sub">Sincronizado con Fudo</div>
            </div>
            <div class="kpi">
                <div class="kpi-lbl">MARGEN NETO</div>
                <div class="kpi-val" style="color: var(--green)">${fmt(totalMargen)}</div>
                <div class="kpi-sub">Ganancia estimada</div>
            </div>
            <div class="kpi">
                <div class="kpi-lbl">RENTABILIDAD</div>
                <div class="kpi-val">${rentabilidad.toFixed(1)}%</div>
                <div class="kpi-sub">Eficiencia de costos</div>
            </div>
        `;

        renderChart(data, idx, parse);
    }

    function renderChart(data, idx, parse) {
        if(myChart) myChart.destroy();
        
        // Si es histórico, agrupamos o filtramos para que no se vea solo un mes
        const chartData = activeSheet === 'Historico' ? data.slice(-30) : data;

        myChart = new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: chartData.map(r => r[idx.fecha]),
                datasets: [{
                    label: 'Venta $',
                    data: chartData.map(r => parse(r[idx.total])),
                    borderColor: '#2a7d40',
                    backgroundColor: 'rgba(93, 191, 114, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3,
                    pointRadius: 4,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#2a7d40'
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#f0f0f0' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function setTab(name, el) {
        activeSheet = name;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        loadData();
    }
</script>
</body>
</html>
