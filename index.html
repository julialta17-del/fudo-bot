<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIG SALADS SEXTA · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0ede6; --bg1: #e8e4db; --white: #ffffff; --green: #2a7d40; --green2: #3a9e52; --green3: #5dbf72;
  --green-bg: #e8f5ec; --green-dark: #1a5430; --orange: #e05a1a; --muted: #7a9a82; --border: #c8dcc8;
  --bebas: 'Bebas Neue', cursive; --sans: 'Outfit', sans-serif; --mono: 'JetBrains Mono', monospace;
  --shadow: 0 2px 12px rgba(42,125,64,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
body { background: var(--bg); color: #1a2e1e; font-family: var(--sans); min-height: 100vh; }

header { position: sticky; top: 0; z-index: 100; background: var(--green-dark); padding: 0 36px; display: flex; align-items: center; justify-content: space-between; height: 68px; box-shadow: 0 2px 20px rgba(0,0,0,0.2); }
.brand { display: flex; align-items: center; gap: 14px; }
.brand-logo { width: 42px; height: 42px; border-radius: 10px; background: var(--green2); display: flex; align-items: center; justify-content: center; font-size: 22px; border: 2px solid rgba(255,255,255,0.2); }
.brand-name { font-family: var(--bebas); font-size: 26px; letter-spacing: 2px; color: #ffffff; }
.brand-name span { color: var(--green3); }

.tabs-wrap { background: var(--green-dark); border-bottom: 3px solid rgba(255,255,255,0.08); padding: 0 36px; display: flex; gap: 2px; overflow-x: auto; }
.tab { padding: 12px 20px; font-family: var(--bebas); font-size: 14px; color: rgba(255,255,255,0.4); cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; transition: 0.2s; white-space: nowrap; }
.tab.active { color: #fff; border-bottom-color: var(--green3); background: rgba(255,255,255,0.05); }

/* Barra de Filtros avanzada para Histórico */
.filters { background: white; padding: 12px 36px; display: none; gap: 20px; align-items: center; border-bottom: 1px solid var(--border); box-shadow: var(--shadow); }
.filters.active { display: flex; }
.f-group { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 10px; color: var(--muted); }
input, select { padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; font-family: var(--sans); }

main { padding: 28px 36px; max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; gap: 28px; }
.sec-title { font-family: var(--bebas); font-size: 18px; letter-spacing: 2px; color: var(--green-dark); display: flex; align-items: center; gap: 10px; }
.sec-line { flex: 1; height: 1px; background: var(--border); }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 14px; }
.kpi { background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; }
.kpi-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.kpi-val { font-family: var(--bebas); font-size: 40px; color: #1a2e1e; line-height: 1; margin: 5px 0; }
.kpi-val span { font-size: 20px; color: var(--muted); }

.card { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
.card-head { padding: 18px 22px; background: #f8fbf8; border-bottom: 1px solid var(--bg1); display: flex; justify-content: space-between; align-items: center; }
.card-title { font-family: var(--bebas); font-size: 18px; color: var(--green-dark); }

.grid-main { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #f1f1f1; padding: 10px; text-align: left; font-family: var(--mono); font-size: 10px; color: var(--muted); }
td { padding: 10px; border-bottom: 1px solid #eee; }

#loader { position: fixed; inset: 0; background: var(--green-dark); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; gap: 15px; }
#loader.on { display: flex; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #5dbf72; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 900px) { .grid-main { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div id="loader" class="on"><div class="spinner"></div><div style="font-family:var(--bebas); letter-spacing:2px;">BIG ESTA COCINANDO...</div></div>

<header>
  <div class="brand">
    <div class="brand-logo">🥗</div>
    <div class="brand-name">BIG <span>SALADS</span> SEXTA</div>
  </div>
  <button onclick="fullRefresh()" style="background:white; color:var(--green-dark); border:none; padding:8px 16px; border-radius:8px; font-family:var(--mono); font-size:10px; font-weight:bold; cursor:pointer;">ACTUALIZAR</button>
</header>

<div class="tabs-wrap" id="tabsWrap"></div>

<div class="filters" id="filterBar">
  <div class="f-group"><label>DESDE:</label><input type="date" id="fDesde" onchange="renderAll()"></div>
  <div class="f-group"><label>HASTA:</label><input type="date" id="fHasta" onchange="renderAll()"></div>
  <div class="f-group"><label>ORIGEN:</label>
    <select id="fOri" onchange="renderAll()">
      <option value="TODOS">TODOS</option>
      <option value="Local">LOCAL</option>
      <option value="Pedidos Ya">PEDIDOS YA</option>
    </select>
  </div>
</div>

<main>
  <div class="sec-title">RESUMEN GENERAL <div class="sec-line"></div></div>
  <div class="kpi-grid" id="kpiContainer"></div>

  <div class="grid-main">
    <div class="card">
      <div class="card-head"><div class="card-title">EVOLUCIÓN DE VENTAS</div></div>
      <div style="padding:20px;"><canvas id="chartMain" height="300"></canvas></div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">MEDIOS DE PAGO / PRODUCTOS</div></div>
      <div style="padding:20px;"><canvas id="chartSide" height="300"></canvas></div>
    </div>
  </div>

  <div class="sec-title">DETALLE DE OPERACIONES <div class="sec-line"></div></div>
  <div class="card" style="overflow-x:auto;">
    <table id="dataTable"><thead><tr id="tHead"></tr></thead><tbody id="tBody"></tbody></table>
  </div>
</main>

<script>
const ID = '2PACX-1vSqXw7W2kUj_BsUyLKYmRIIZyYacKR9nYbaeXRFqSPzBVZuyCuj7Vl_Cf13tTTJAq9jGVXudNqWfiiC';
let allSheets = [];
let activeTab = 'Hoja 1';
let myCharts = {};

const $ = id => document.getElementById(id);
const fmt = v => new Intl.NumberFormat('es-AR', {style: 'currency', currency: 'ARS', maximumFractionDigits: 0}).format(v);

function parseCSV(csv) {
    const lines = csv.split('\n').filter(l => l.trim() !== '');
    const rows = lines.map(line => {
        const res = []; let cur = '', inQ = false;
        for(let c of line) {
            if(char === '"') inQ = !inQ;
            else if(c === ',' && !inQ) { res.push(cur.trim()); cur = ''; }
            else cur += c;
        }
        res.push(cur.trim());
        return res;
    });
    return { h: rows[0], d: rows.slice(1).filter(r => r.length > 5) };
}

// CARGA MEJORADA: Intenta detectar Historico aunque Google falle
async function fullRefresh() {
    $('loader').classList.add('on');
    try {
        const ts = Date.now();
        const [r1, r2] = await Promise.all([
            fetch(`https://docs.google.com/spreadsheets/d/e/${ID}/pub?output=csv&gid=0&t=${ts}`).then(r => r.text()),
            fetch(`https://docs.google.com/spreadsheets/d/e/${ID}/pub?output=csv&sheet=Historico&t=${ts}`).then(r => r.text())
        ]);

        allSheets = [];
        const h1 = processCSV(r1, 'Hoja 1');
        if(h1) allSheets.push(h1);

        if(r2 && r2.length > 100 && r2 !== r1) {
            const hist = processCSV(r2, 'Historico');
            if(hist) allSheets.push(hist);
        }

        renderTabs();
        renderAll();
    } catch (e) { alert("Error al conectar con Google Sheets."); }
    $('loader').classList.remove('on');
}

function processCSV(data, name) {
    const lines = data.split('\n').filter(l => l.trim() !== '');
    const rows = lines.map(l => {
        const res = []; let cur = '', inQ = false;
        for(let char of l) {
            if(char === '"') inQ = !inQ;
            else if(char === ',' && !inQ) { res.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        res.push(cur.trim());
        return res;
    });
    return { name, headers: rows[0], data: rows.slice(1) };
}

function renderTabs() {
    $('tabsWrap').innerHTML = allSheets.map(s => `
        <button class="tab ${activeTab === s.name ? 'active' : ''}" onclick="changeTab('${s.name}')">
          📄 ${s.name.toUpperCase()}
        </button>
    `).join('');
}

function changeTab(name) {
    activeTab = name;
    renderTabs();
    renderAll();
}

function renderAll() {
    const sheet = allSheets.find(s => s.name === activeTab);
    if (!sheet) return;

    const h = sheet.headers;
    let d = sheet.data;

    // Mapeo de columnas por nombre exacto
    const idx = {
        fecha: h.findIndex(x => x === 'Fecha'),
        total: h.findIndex(x => x === 'Total'),
        margen: h.findIndex(x => x === 'Margen_Neto_$'),
        origen: h.findIndex(x => x === 'Origen'),
        pago: h.findIndex(x => x === 'Medio de Pago')
    };

    // Filtros avanzados (Solo Historico)
    if (activeTab === 'Historico') {
        $('filterBar').classList.add('active');
        const desde = $('fDesde').value;
        const hasta = $('fHasta').value;
        const ori = $('fOri').value;

        if(desde || hasta || ori !== 'TODOS') {
            d = d.filter(r => {
                const parts = r[idx.fecha].split('/');
                const fDate = new Date(parts[2], parts[1]-1, parts[0]);
                const matchD = (!desde || fDate >= new Date(desde + "T00:00:00"));
                const matchH = (!hasta || fDate <= new Date(hasta + "T23:59:59"));
                const matchO = (ori === 'TODOS' || r[idx.origen] === ori);
                return matchD && matchH && matchO;
            });
        }
    } else {
        $('filterBar').classList.remove('active');
    }

    // Cálculos de KPIs
    const totalV = d.reduce((a, b) => a + (parseFloat(b[idx.total]) || 0), 0);
    const totalM = d.reduce((a, b) => a + (parseFloat(b[idx.margen]) || 0), 0);
    const ticketP = totalV / (d.length || 1);

    $('kpiContainer').innerHTML = `
        <div class="kpi"><div class="kpi-lbl">VENTA BRUTA</div><div class="kpi-val"><span>$</span>${fmt(totalV).replace('$','')}</div></div>
        <div class="kpi"><div class="kpi-lbl">MARGEN NETO</div><div class="kpi-val" style="color:var(--green)"><span>$</span>${fmt(totalM).replace('$','')}</div></div>
        <div class="kpi"><div class="kpi-lbl">TICKET PROMEDIO</div><div class="kpi-val"><span>$</span>${fmt(ticketP).replace('$','')}</div></div>
        <div class="kpi"><div class="kpi-lbl">RENTABILIDAD</div><div class="kpi-val">${((totalM/totalV)*100 || 0).toFixed(1)}<span>%</span></div></div>
    `;

    // Tabla
    $('tHead').innerHTML = `<tr>${h.map(x => `<th>${x}</th>`).join('')}</tr>`;
    $('tBody').innerHTML = d.slice(-30).reverse().map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');

    renderCharts(d, idx);
}

function renderCharts(data, idx) {
    if(myCharts.main) myCharts.main.destroy();
    if(myCharts.side) myCharts.side.destroy();

    // Gráfico Evolución (Línea para Historico, Barras para Resumen)
    const ultimos = data.slice(-20);
    myCharts.main = new Chart($('chartMain'), {
        type: activeTab === 'Historico' ? 'line' : 'bar',
        data: {
            labels: ultimos.map(r => r[idx.fecha]),
            datasets: [{ label: 'Venta $', data: ultimos.map(r => parseFloat(r[idx.total])), borderColor: '#2a7d40', backgroundColor: 'rgba(42, 125, 64, 0.1)', fill: true, tension: 0.3 }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    // Gráfico de Medios de Pago
    const pagos = {};
    data.forEach(r => { const p = r[idx.pago] || 'Otros'; pagos[p] = (pagos[p] || 0) + (parseFloat(r[idx.total]) || 0); });
    
    myCharts.side = new Chart($('chartSide'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(pagos),
            datasets: [{ data: Object.values(pagos), backgroundColor: ['#1a5430', '#3a9e52', '#e05a1a', '#f5c030', '#5dbf72'] }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
    });
}

window.onload = fullRefresh;
</script>
</body>
</html>
