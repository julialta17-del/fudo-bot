<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG SALADS · Intelligence Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root { --green: #2a7d40; --light: #5dbf72; --dark: #12331c; --bg: #f4f7f4; --white: #ffffff; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        #auth-screen { position: fixed; inset: 0; background: var(--dark); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.05); padding: 50px; border-radius: 30px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .btn-login { background: var(--light); color: white; border: none; padding: 18px 40px; border-radius: 15px; font-family: 'Bebas Neue'; font-size: 26px; cursor: pointer; transition: 0.3s; width: 100%; }

        header { background: var(--dark); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Bebas Neue'; font-size: 32px; letter-spacing: 1px; }
        .logo span { color: var(--light); }

        .tabs { background: white; display: flex; padding: 0 30px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { padding: 20px 15px; cursor: pointer; font-family: 'Bebas Neue'; font-size: 18px; color: #999; transition: 0.3s; }
        .tab.active { color: var(--green); border-bottom: 4px solid var(--green); }

        main { padding: 20px; max-width: 1400px; margin: 0 auto; display: none; }
        main.active { display: block; }

        /* Filtros */
        .filters { background: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; border: 1px solid #eee; }
        .filters input { padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Outfit'; }

        /* Grillas */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .kpi { background: white; padding: 20px; border-radius: 15px; border-left: 6px solid var(--green); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .kpi-lbl { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .kpi-val { font-family: 'Bebas Neue'; font-size: 32px; color: var(--dark); }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .card-h { font-family: 'Bebas Neue'; font-size: 22px; color: var(--dark); border-bottom: 1px solid #f0f0f0; margin-bottom: 15px; padding-bottom: 10px; display: flex; justify-content: space-between; }
        
        .list-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
        .list-item:last-child { border: none; }
        .trend-up { color: #2a7d40; font-weight: bold; }
        .trend-down { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <div class="logo">BIG SALADS <span>HUB</span></div>
        <button class="btn-login" id="authorize_button">ENTRAR AL SISTEMA</button>
    </div>
</div>

<header>
    <div class="logo">BIG SALADS <span>BUSINESS</span></div>
    <div id="sync-status" style="font-size: 12px;">● CONECTADO</div>
</header>

<div class="tabs">
    <div class="tab active" onclick="setTab('Hoja 1', this)">RESUMEN DIARIO</div>
    <div class="tab" onclick="setTab('Historico', this)">ANÁLISIS ESTRATÉGICO</div>
</div>

<main id="main-content">
    <div id="historico-filters" class="filters" style="display:none;">
        <span>Desde:</span> <input type="date" id="date-from">
        <span>Hasta:</span> <input type="date" id="date-to">
        <button class="btn-login" style="padding: 8px 20px; font-size: 16px; width: auto; margin-top: 0;" onclick="loadData()">FILTRAR</button>
    </div>

    <div class="kpi-grid" id="kpi-container"></div>

    <div class="dashboard-grid" id="dashboard-content">
        </div>
</main>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

<script>
    const CLIENT_ID = '89958085370-j4jbkoa7t3u4o0br5erg3j9h3nrcif3g.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyAVQoifZYh3oc2T1p9xMYKNhe_XtIYQjYc'; 
    const SPREADSHEET_ID = '1uEFRm_0zEhsRGUX9PIomjUhiijxWVnCXnSMQuUJK5a8';

    let gapiInited = false, gisInited = false, tokenClient, activeSheet = 'Hoja 1';

    function gapiLoaded() { gapi.load('client', async () => {
        await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"] });
        gapiInited = true; checkAuth();
    });}
    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
            callback: (resp) => { if (resp.access_token) { document.getElementById('auth-screen').style.display = 'none'; loadData(); } }
        });
        gisInited = true; checkAuth();
    }
    function checkAuth() { if (gapiInited && gisInited) document.getElementById('authorize_button').onclick = () => tokenClient.requestAccessToken(); }

    async function loadData() {
        const range = activeSheet === 'Hoja 1' ? 'Hoja 1!A1:Z500' : 'Historico!A1:Z10000';
        const resp = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: SPREADSHEET_ID, range: range });
        processData(resp.result.values);
    }

    function processData(rows) {
        const headers = rows[0];
        let data = rows.slice(1).filter(r => r[0]);
        const fmt = v => new Intl.NumberFormat('es-AR', {style:'currency', currency:'ARS', maximumFractionDigits:0}).format(v);
        const parse = v => parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;

        const idx = {
            total: headers.findIndex(h => h.toLowerCase().includes('total')),
            margen: headers.findIndex(h => h.toLowerCase().includes('margen')),
            fecha: headers.findIndex(h => h.toLowerCase().includes('fecha')),
            hora: headers.findIndex(h => h.toLowerCase().includes('hora')),
            origen: headers.findIndex(h => h.toLowerCase().includes('origen')),
            pago: headers.findIndex(h => h.toLowerCase().includes('pago')),
            producto: headers.findIndex(h => h.toLowerCase().includes('producto'))
        };

        // Filtro de fecha para Histórico
        if(activeSheet === 'Historico') {
            const from = document.getElementById('date-from').value;
            const to = document.getElementById('date-to').value;
            if(from && to) {
                data = data.filter(r => {
                    const d = new Date(r[idx.fecha]).getTime();
                    return d >= new Date(from).getTime() && d <= new Date(to).getTime();
                });
            }
        }

        // Lógica de Turnos (Mañana < 17:00, Noche >= 17:00)
        const turnos = { m_val:0, m_cnt:0, n_val:0, n_cnt:0 };
        data.forEach(r => {
            const h = parseInt(r[idx.hora]) || 0;
            const val = parse(r[idx.total]);
            if(h < 17) { turnos.m_val += val; turnos.m_cnt++; }
            else { turnos.n_val += val; turnos.n_cnt++; }
        });

        // Orígenes y Pagos
        const origenes = {}, pagos = {}, productos = {}, productosMargen = {};
        data.forEach(r => {
            const org = r[idx.origen] === '0' ? 'Local' : r[idx.origen];
            origenes[org] = (origenes[org] || 0) + parse(r[idx.total]);
            
            const pg = r[idx.pago] || 'Otro';
            pagos[pg] = (pagos[pg] || 0) + parse(r[idx.total]);

            const prod = r[idx.producto];
            if(prod) {
                productos[prod] = (productos[prod] || 0) + 1;
                productosMargen[prod] = (productosMargen[prod] || 0) + parse(r[idx.margen]);
            }
        });

        const totalVenta = data.reduce((a, b) => a + parse(b[idx.total]), 0);
        const totalMargen = data.reduce((a, b) => a + parse(b[idx.margen]), 0);

        // KPIs SUPERIORES
        document.getElementById('kpi-container').innerHTML = `
            <div class="kpi"><div class="kpi-lbl">VENTA TOTAL</div><div class="kpi-val">${fmt(totalVenta)}</div></div>
            <div class="kpi"><div class="kpi-lbl">GANANCIA ESTIMADA</div><div class="kpi-val" style="color:var(--green)">${fmt(totalMargen)}</div></div>
            <div class="kpi"><div class="kpi-lbl">TICKET PROMEDIO</div><div class="kpi-val">${fmt(totalVenta/data.length || 0)}</div></div>
            <div class="kpi"><div class="kpi-lbl">TOTAL TICKETS</div><div class="kpi-val">${data.length}</div></div>
        `;

        // CONTENIDO PRINCIPAL
        let html = `
            <div class="card">
                <div class="card-h">DESGLOSE POR TURNOS</div>
                <div class="list-item"><span>MAÑANA (Cant: ${turnos.m_cnt})</span> <strong>${fmt(turnos.m_val)}</strong></div>
                <div class="list-item"><span>NOCHE (Cant: ${turnos.n_cnt})</span> <strong>${fmt(turnos.n_val)}</strong></div>
            </div>
            <div class="card">
                <div class="card-h">ORIGEN DE VENTAS (%)</div>
                ${Object.entries(origenes).map(([k,v]) => `
                    <div class="list-item"><span>${k} (${((v/totalVenta)*100).toFixed(1)}%)</span> <strong>${fmt(v)}</strong></div>
                `).join('')}
            </div>
            <div class="card">
                <div class="card-h">MEDIOS DE PAGO</div>
                ${Object.entries(pagos).map(([k,v]) => `
                    <div class="list-item"><span>${k}</span> <strong>${fmt(v)}</strong></div>
                `).join('')}
            </div>
            <div class="card">
                <div class="card-h">TOP 5 PRODUCTOS (Ventas)</div>
                ${Object.entries(productos).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,v]) => `
                    <div class="list-item"><span>${k}</span> <strong>${v} u.</strong></div>
                `).join('')}
            </div>
        `;

        if(activeSheet === 'Historico') {
            const proyectado = (totalVenta / data.length) * 30; // Proyectado mensual simple
            html += `
                <div class="card">
                    <div class="card-h">ANÁLISIS ESTRATÉGICO</div>
                    <div class="list-item"><span>PROYECTADO MENSUAL</span> <strong class="trend-up">${fmt(proyectado)}</strong></div>
                    <div class="list-item"><span>PRODUCTO MAYOR MARGEN</span> <strong>${Object.entries(productosMargen).sort((a,b)=>b[1]-a[1])[0][0]}</strong></div>
                </div>
            `;
        }

        document.getElementById('dashboard-content').innerHTML = html;
        document.getElementById('main-content').classList.add('active');
    }

    function setTab(name, el) {
        activeSheet = name;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('historico-filters').style.display = name === 'Historico' ? 'flex' : 'none';
        loadData();
    }
</script>
</body>
</html>
