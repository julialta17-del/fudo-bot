<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIG SALADS SEXTA · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0ede6; --bg1: #e8e4db; --white: #ffffff; --card: #ffffff; --green: #2a7d40; --green2: #3a9e52; --green3: #5dbf72; --green-bg: #e8f5ec; --green-dark: #1a5430; --orange: #e05a1a; --orange-bg: #fef0e8; --yellow: #f5c030; --yellow-bg: #fef8e0; --red: #d94040; --red-bg: #fde8e8; --text: #1a2e1e; --text2: #3a5040; --muted: #7a9a82; --border: #c8dcc8; --border2: #a8c8a8; --shadow: 0 2px 12px rgba(42,125,64,0.08); --shadow-lg: 0 8px 32px rgba(42,125,64,0.12); --bebas: 'Bebas Neue', cursive; --sans: 'Outfit', sans-serif; --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 400; min-height: 100vh; }
body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 180px; }
header { position: sticky; top: 0; z-index: 100; background: var(--green-dark); padding: 0 36px; display: flex; align-items: center; justify-content: space-between; height: 68px; box-shadow: 0 2px 20px rgba(0,0,0,0.2); }
.brand { display: flex; align-items: center; gap: 14px; }
.brand-logo { width: 42px; height: 42px; border-radius: 10px; background: var(--green2); display: flex; align-items: center; justify-content: center; font-size: 22px; border: 2px solid rgba(255,255,255,0.2); }
.brand-name { font-family: var(--bebas); font-size: 26px; letter-spacing: 2px; color: #ffffff; line-height: 1; }
.brand-name span { color: var(--green3); }
.tabs-wrap { background: var(--green-dark); border-bottom: 3px solid rgba(255,255,255,0.08); padding: 0 36px; display: flex; gap: 2px; overflow-x: auto; }
.tab { padding: 11px 18px 9px; font-family: var(--bebas); font-size: 14px; letter-spacing: 1.5px; color: rgba(255,255,255,0.45); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -3px; transition: all 0.15s; white-space:nowrap; background:none; border-top:none; border-left:none; border-right:none; }
.tab.active { color:#fff; border-bottom-color: var(--green3); background: rgba(255,255,255,0.05); }
main { position:relative;z-index:1; padding: 28px 36px 60px; display:flex; flex-direction:column; gap:28px; max-width:1600px; margin:0 auto; }
.sec { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.sec-title { font-family:var(--bebas); font-size:18px; letter-spacing:2px; color:var(--green-dark); white-space:nowrap; }
.sec-line { flex:1; height:1px; background:var(--border); }
.kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.kpi { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:20px 18px; box-shadow:var(--shadow); position:relative; overflow:hidden; transition:transform 0.18s, box-shadow 0.18s; animation:up 0.4s ease both; }
.kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--kc,var(--green)); border-radius:3px 3px 0 0; }
.kpi[data-c=yellow] { --kc:var(--yellow); }
.kpi-val { font-family:var(--bebas); font-size:40px; letter-spacing:1px; color:var(--text); line-height:1.05; margin:4px 0 2px; }
.kpi-val .u { font-size:22px; color:var(--muted); }
.card { background:var(--white); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:var(--shadow); }
.card-head { padding:18px 22px 14px; border-bottom:1px solid var(--bg1); display:flex; justify-content:space-between; align-items:flex-start; }
.card-title { font-family:var(--bebas); font-size:20px; color:var(--green-dark); }
.chart-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.month-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; margin-top:16px; }
.mc { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:16px 18px; box-shadow:var(--shadow); transition:transform 0.15s; }
.mc-month { font-family:var(--bebas); font-size:20px; color:var(--green-dark); }
.mc-stats { display:flex; flex-direction:column; gap:7px; margin-top:10px; }
.mc-row { display:flex; justify-content:space-between; align-items:center; font-size:12px; }
.mc-row-val { font-family:var(--bebas); font-size:18px; color:var(--green); }
.tscroll { overflow-x:auto; max-height:400px; overflow-y:auto; }
table { width:100%; border-collapse:collapse; min-width:500px; }
th { background:var(--bg1); padding:10px; text-align:left; font-family:var(--mono); font-size:9px; position:sticky; top:0; z-index:10; }
td { padding:10px; border-bottom:1px solid var(--bg1); font-size:12px; }
#loader { position:fixed; inset:0; background:rgba(26,84,48,0.92); z-index:300; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
#loader.on { display:flex; }
@keyframes rotate { to { transform:rotate(360deg); } }
@keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="loader" class="on">
  <div style="width:48px;height:48px;border-radius:50%;border:3px solid rgba(255,255,255,0.15);border-top-color:#6be082;animation:rotate 0.75s linear infinite;"></div>
  <div style="color:white;font-family:var(--bebas);letter-spacing:3px;font-size:20px;">SINCRONIZANDO DATOS...</div>
</div>

<header>
  <div class="brand">
    <div class="brand-logo">🥗</div>
    <div class="brand-name">BIG <span>SALADS</span> SEXTA</div>
  </div>
  <div class="header-right">
    <div class="status-pill" style="background:rgba(255,255,255,0.1); border-radius:999px; padding:7px 14px; color:rgba(255,255,255,0.6); font-family:var(--mono); font-size:10px;">
      <span id="stTxt">Iniciando...</span>
    </div>
    <button class="btn" style="background:#fff; border:none; padding:8px 16px; border-radius:8px; cursor:pointer;" onclick="fullRefresh()">ACTUALIZAR</button>
  </div>
</header>

<div class="tabs-wrap">
  <button class="tab" id="tab_resumen" onclick="switchMode('resumen')">RESUMEN DEL DÍA</button>
  <button class="tab" id="tab_historico" onclick="switchMode('historico')">HISTÓRICO</button>
</div>

<main>
  <div class="kpi-grid">
    <div class="kpi">
      <div style="font-size:9px; font-family:var(--mono); color:var(--muted);">VENTAS TOTALES</div>
      <div class="kpi-val" id="kTotal"><span class="u">$</span>—</div>
    </div>
    <div class="kpi">
      <div style="font-size:9px; font-family:var(--mono); color:var(--muted);">MARGEN NETO</div>
      <div class="kpi-val" id="kMargen"><span class="u">$</span>—</div>
    </div>
    <div class="kpi" data-c="yellow">
      <div style="font-size:9px; font-family:var(--mono); color:var(--muted);">TICKET PROMEDIO</div>
      <div class="kpi-val" id="kAvgTicket"><span class="u">$</span>—</div>
    </div>
  </div>

  <div class="chart-row">
    <div class="card"><div class="card-head"><div class="card-title">📍 ORIGEN</div></div><div style="padding:20px;"><canvas id="chartOrigen" height="150"></canvas></div></div>
    <div class="card"><div class="card-head"><div class="card-title">🌙 TURNOS</div></div><div style="padding:20px;"><canvas id="chartTurno" height="150"></canvas></div></div>
    <div class="card"><div class="card-head"><div class="card-title">💳 PAGOS</div></div><div id="payList" style="padding:20px;"></div></div>
  </div>

  <div id="historicoStats" style="display:none;">
    <div class="sec"><div class="sec-title">ANÁLISIS ÚLTIMOS 6 MESES</div><div class="sec-line"></div></div>
    <div class="month-grid" id="monthGrid"></div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-title" id="tableTitle">DETALLE DE VENTAS</div></div>
    <div class="tscroll"><table><thead id="tHead"></thead><tbody id="tBody"></tbody></table></div>
  </div>
</main>

<script>
// CONFIGURACIÓN DE IDs
const SPREADSHEET_ID = '1uEFRm_0zEhsRGUX9PIomjUhiijxWVnCXnSMQuUJK5a8';
const GIDS = {
    'resumen': '0',
    'historico': '1009875780'
};

let activeMode = 'resumen';
let charts = {};
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const fmt = n => new Intl.NumberFormat('es-AR',{maximumFractionDigits:0}).format(Math.round(n));
const parseN = s => {
    if(!s) return 0;
    let n = parseFloat(String(s).replace(/[^\d.,\-]/g,'').replace(',','.'));
    return isNaN(n) ? 0 : n;
};

async function switchMode(mode) {
    activeMode = mode;
    await fullRefresh();
}

async function fullRefresh() {
    document.getElementById('loader').classList.add('on');
    document.getElementById('tab_resumen').className = `tab ${activeMode === 'resumen' ? 'active' : ''}`;
    document.getElementById('tab_historico').className = `tab ${activeMode === 'historico' ? 'active' : ''}`;

    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${GIDS[activeMode]}&_=${Date.now()}`;
    
    try {
        const r = await fetch(url);
        const text = await r.text();
        const rows = text.split('\n').map(row => {
            let cells = []; let inQ = false; let cur = '';
            for(let c of row) { if(c === '"') inQ = !inQ; else if(c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; } else cur += c; }
            cells.push(cur.trim()); return cells;
        }).filter(r => r.length > 1);

        renderData(rows);
    } catch(e) { console.error(e); }
    
    document.getElementById('loader').classList.remove('on');
}

function renderData(data) {
    const headers = data[0].map(h => h.toLowerCase().trim());
    const rows = data.slice(1);

    const idx = { 
        total: headers.indexOf('total'), margen: headers.indexOf('margen neto'), 
        fecha: headers.indexOf('fecha'), origen: headers.indexOf('origen'), 
        turno: headers.indexOf('turno'), medio: headers.indexOf('medio de pago')
    };

    document.getElementById('historicoStats').style.display = activeMode === 'historico' ? 'block' : 'none';
    document.getElementById('tableTitle').innerText = activeMode === 'resumen' ? 'DETALLE DE HOY' : 'HISTORIAL COMPLETO';

    let sumV = 0, sumM = 0;
    const oD = {}, tD = {}, mD = {}, mensual = {};

    rows.forEach(r => {
        const v = parseN(r[idx.total]);
        sumV += v;
        sumM += parseN(r[idx.margen]);

        let o = r[idx.origen] || 'Local'; oD[o] = (oD[o]||0) + v;
        let t = r[idx.turno] || 'N/A'; tD[t] = (tD[t]||0) + v;
        let m = r[idx.medio] || 'Otro'; if(!mD[m]) mD[m]={s:0,c:0}; mD[m].s += v; mD[m].c++;

        if(activeMode === 'historico') {
            const f = r[idx.fecha] || '';
            const p = f.split('/');
            if(p.length === 3) {
                const k = `${p[2]}-${p[1].padStart(2,'0')}`;
                if(!mensual[k]) mensual[k] = { s:0, t:0, d:new Set(), l:`${MESES[parseInt(p[1])-1]} ${p[2]}` };
                mensual[k].s += v; mensual[k].t++; mensual[k].d.add(p[0]);
            }
        }
    });

    document.getElementById('kTotal').innerText = `$${fmt(sumV)}`;
    document.getElementById('kMargen').innerText = `$${fmt(sumM)}`;
    document.getElementById('kAvgTicket').innerText = `$${fmt(sumV/rows.length)}`;

    updateChart('chartOrigen', 'doughnut', Object.keys(oD), Object.values(oD));
    updateChart('chartTurno', 'bar', Object.keys(tD), Object.values(tD));

    document.getElementById('payList').innerHTML = Object.entries(mD).sort((a,b)=>b[1].s-a[1].s).map(e => `
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:4px;">
            <span>${e[0]}</span><b>$${fmt(e[1].s)}</b>
        </div>`).join('');

    if(activeMode === 'historico') {
        const keys = Object.keys(mensual).sort().reverse();
        document.getElementById('monthGrid').innerHTML = keys.map(k => `
            <div class="mc">
                <div class="mc-month">${mensual[k].l}</div>
                <div class="mc-stats">
                    <div class="mc-row">Ventas: <span class="mc-row-val">$${fmt(mensual[k].s)}</span></div>
                    <div class="mc-row">Tickets/Día: <b style="color:var(--orange)">${(mensual[k].t/mensual[k].d.size).toFixed(1)}</b></div>
                </div>
            </div>`).join('');
    }

    document.getElementById('tHead').innerHTML = data[0].map(h => `<th>${h}</th>`).join('');
    document.getElementById('tBody').innerHTML = rows.slice(-150).reverse().map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
    
    document.getElementById('stTxt').innerText = "Sincronizado";
}

function updateChart(id, type, labels, data) {
    if(charts[id]) charts[id].destroy();
    charts[id] = new Chart(document.getElementById(id), {
        type, data: { labels, datasets: [{ data, backgroundColor: ['#2a7d40','#e05a1a','#f5c030','#3a9e52','#5dbf72'] }] },
        options: { plugins: { legend: { display: type==='doughnut', position: 'bottom' } } }
    });
}

fullRefresh();
</script>
</body>
</html>
