<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIG SALADS · SEXTA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --g: #1a7a43;
  --g-light: #e8f5ee;
  --g-mid: #2fa05a;
  --r: #d90429;
  --r-light: #fdeaed;
  --dark: #0d1f14;
  --ink: #131c11;
  --muted: #6b7c6e;
  --bg: #f0f4f1;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.08);
  --amber: #e8840c;
  --amber-light: #fff4e6;
  --blue: #1a63b5;
  --blue-light: #eaf1fb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

#auth-screen {
  position: fixed; inset: 0; background: var(--dark);
  z-index: 2000; display: flex; align-items: center; justify-content: center;
}
.auth-inner { text-align: center; }
.auth-logo { font-family: 'Syne', sans-serif; font-size: 72px; color: #fff; letter-spacing: -2px; line-height: 1; }
.auth-logo em { color: var(--g-mid); font-style: normal; }
.auth-sub { color: var(--muted); font-size: 13px; letter-spacing: 4px; text-transform: uppercase; margin: 12px 0 40px; }
.btn-auth {
  background: var(--g); color: #fff; border: none;
  padding: 16px 48px; border-radius: 100px;
  font-family: 'Syne', sans-serif; font-size: 18px;
  cursor: pointer; letter-spacing: 1px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-auth:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(26,122,67,0.4); }

header {
  background: var(--dark); color: #fff;
  padding: 0 32px;
  display: flex; justify-content: space-between; align-items: center;
  height: 60px; position: sticky; top: 0; z-index: 500;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.logo { font-family: 'Syne', sans-serif; font-size: 22px; letter-spacing: -0.5px; }
.logo em { color: var(--g-mid); font-style: normal; }
.status-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; }

.tabs {
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; padding: 0 32px; gap: 4px;
  position: sticky; top: 60px; z-index: 400;
}
.tab {
  padding: 16px 20px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  letter-spacing: 0.3px;
}
.tab.active { color: var(--g); border-color: var(--g); }
.tab:hover:not(.active) { color: var(--ink); }

main { padding: 28px 32px; max-width: 1440px; margin: 0 auto; display: none; }
main.active { display: block; }

.filters {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px 20px;
  display: flex; gap: 16px; align-items: flex-end;
  margin-bottom: 24px;
}
.filter-field label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
input[type="date"], input[type="number"], select {
  padding: 9px 14px; border: 1px solid var(--border);
  border-radius: 10px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; background: var(--bg); color: var(--ink);
  outline: none;
}
input[type="date"]:focus, input[type="number"]:focus, select:focus { border-color: var(--g); }
.btn-filter {
  background: var(--g); color: #fff; border: none;
  padding: 10px 24px; border-radius: 10px;
  font-family: 'Syne', sans-serif; font-size: 15px;
  cursor: pointer; letter-spacing: 0.5px;
}

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 22px 24px;
  position: relative; overflow: hidden;
}
.kpi::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--kpi-accent, var(--g));
}
.kpi-icon { font-size: 22px; margin-bottom: 12px; }
.kpi-lbl { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }
.kpi-val { font-family: 'Syne', sans-serif; font-size: 32px; color: var(--ink); margin-top: 4px; letter-spacing: -1px; }
.kpi-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.kpi.accent-red { --kpi-accent: var(--r); }
.kpi.accent-amber { --kpi-accent: var(--amber); }
.kpi.accent-blue { --kpi-accent: var(--blue); }

.trend { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 100px; }
.trend.up { background: var(--g-light); color: var(--g); }
.trend.down { background: var(--r-light); color: var(--r); }

.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 20px; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px;
}
.card-h {
  font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
  color: var(--ink); margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}
.card-h .lbl { font-size: 11px; font-weight: 500; color: var(--muted); margin-left: auto; text-transform: uppercase; letter-spacing: 0.8px; }

.data-table { width: 100%; border-collapse: collapse; }
.data-table td { padding: 10px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
.data-table tr:last-child td { border-bottom: none; }
.data-table .num { text-align: right; font-weight: 500; font-family: 'Syne', sans-serif; font-size: 15px; }
.data-table .rank { font-size: 11px; font-weight: 700; color: var(--muted); width: 24px; }
.medal-1 { color: #f59e0b; }
.medal-2 { color: #94a3b8; }
.medal-3 { color: #b45309; }

.pill-bar-wrap { display: flex; flex-direction: column; gap: 10px; }
.pill-bar-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.pill-bar-label { min-width: 90px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pill-bar-track { flex: 1; background: var(--bg); border-radius: 100px; height: 8px; overflow: hidden; }
.pill-bar-fill { height: 100%; border-radius: 100px; transition: width 0.6s ease; }
.pill-bar-val { min-width: 80px; text-align: right; font-weight: 500; font-size: 12px; color: var(--muted); }

.split-row { display: flex; gap: 0; }
.split-half { flex: 1; padding: 16px; text-align: center; }
.split-half:first-child { border-right: 1px solid var(--border); }
.split-half .big { font-family: 'Syne', sans-serif; font-size: 28px; letter-spacing: -1px; }
.split-half .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
.split-half .tickets { font-size: 13px; color: var(--muted); margin-top: 2px; }

.heatmap-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
.heat-cell {
  aspect-ratio: 1; border-radius: 6px; display: flex;
  align-items: center; justify-content: center;
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.8);
  cursor: default; transition: transform 0.1s;
}
.heat-cell:hover { transform: scale(1.1); }
.heat-labels { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; margin-top: 4px; }
.heat-lbl { font-size: 9px; color: var(--muted); text-align: center; }

.loading-overlay {
  position: fixed; inset: 0; background: rgba(13,31,20,0.7);
  z-index: 999; display: flex; align-items: center; justify-content: center;
}
.spinner {
  width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
  border-top-color: var(--g-mid); border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ESTRATEGIA */
.estrategia-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
.tactica-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px; position: relative; overflow: hidden;
}
.tactica-card::before {
  content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 4px;
  background: var(--tc-color, var(--g));
}
.tactica-icon { font-size: 28px; margin-bottom: 10px; }
.tactica-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.tactica-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
.tactica-impact {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 100px;
  background: var(--tc-bg, var(--g-light));
  color: var(--tc-color, var(--g));
  text-transform: uppercase; letter-spacing: 0.8px;
}

.proyeccion-controls {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px 24px; margin-bottom: 24px;
  display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap;
}
.proyeccion-controls label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.proyeccion-controls input[type=number] { width: 120px; }

.escenario-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; padding: 4px 12px;
  border-radius: 100px; text-transform: uppercase; letter-spacing: 0.8px;
}
.badge-con { background: var(--amber-light); color: var(--amber); }
.badge-opt { background: var(--g-light); color: var(--g); }
.badge-real { background: var(--blue-light); color: var(--blue); }

.contraste-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.contraste-table th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 2px solid var(--border); }
.contraste-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); }
.contraste-table tr:last-child td { border-bottom: none; }
.contraste-table .num { text-align: right; font-family: 'Syne', sans-serif; font-weight: 600; }
.vs-pos { color: var(--g); }
.vs-neg { color: var(--r); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-inner">
    <div class="auth-logo">BIG<em>SALADS</em></div>
    <div class="auth-sub">SEXTA · Dashboard</div>
    <button class="btn-auth" id="authorize_button">Ingresar al panel</button>
  </div>
</div>

<header>
  <div class="logo">Big<em>Salads</em> Stats</div>
  <div class="status-dot"><div class="dot"></div>En línea</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="setTab('Hoja 1', this)">Hoy</div>
  <div class="tab" onclick="setTab('Historico', this)">Histórico</div>
  <div class="tab" onclick="setTab('Estrategia', this)">🎯 Estrategia</div>
</div>

<main id="main-content">
  <div id="historico-filters" class="filters" style="display:none;">
    <div class="filter-field"><label>Desde</label><input type="date" id="date-from"></div>
    <div class="filter-field"><label>Hasta</label><input type="date" id="date-to"></div>
    <button class="btn-filter" onclick="loadData()">Filtrar</button>
  </div>
  <div class="kpi-grid" id="kpi-container"></div>
  <div id="dashboard-content"></div>
</main>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
<script>
const CLIENT_ID = '89958085370-j4jbkoa7t3u4o0br5erg3j9h3nrcif3g.apps.googleusercontent.com';
const API_KEY = 'AIzaSyAVQoifZYh3oc2T1p9xMYKNhe_XtIYQjYc';
const SPREADSHEET_ID = '1uEFRm_0zEhsRGUX9PIomjUhiijxWVnCXnSMQuUJK5a8';

let gapiInited = false, gisInited = false, tokenClient, activeSheet = 'Hoja 1', myCharts = {};
let globalStats = { ticketProm: 0, totalTickets: 0, tVenta: 0, tMargen: 0, margenPct: 0 };

function gapiLoaded() {
  gapi.load('client', async () => {
    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"] });
    gapiInited = true; checkAuth();
  });
}
function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
    callback: (resp) => {
      if (resp.access_token) {
        document.getElementById('auth-screen').style.display = 'none';
        loadData();
      }
    }
  });
  gisInited = true; checkAuth();
  const hoy = new Date();
  document.getElementById('date-from').value = new Date(hoy.getFullYear(), hoy.getMonth(), 1).toISOString().split('T')[0];
  document.getElementById('date-to').value = hoy.toISOString().split('T')[0];
}
function checkAuth() {
  if (gapiInited && gisInited) document.getElementById('authorize_button').onclick = () => tokenClient.requestAccessToken();
}

async function loadData() {
  if (activeSheet === 'Estrategia') { renderEstrategia(); return; }
  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay'; overlay.id = 'loading';
  overlay.innerHTML = '<div class="spinner"></div>';
  document.body.appendChild(overlay);
  try {
    const range = activeSheet === 'Hoja 1' ? 'Hoja 1!A1:Z1000' : 'Historico!A1:Z25000';
    const resp = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: SPREADSHEET_ID, range });
    processData(resp.result.values);
  } catch(e) {
    console.error(e);
  } finally {
    document.getElementById('loading')?.remove();
  }
}

// ============================================================
// PARSEO ROBUSTO
// ============================================================
function parse(v) {
  if (v == null || v === '' || v === '-' || v === '—') return 0;
  let s = String(v).trim();
  s = s.replace(/[$\s]/g, '');
  const neg = s.startsWith('(') && s.endsWith(')');
  s = s.replace(/[()]/g, '');
  const hasPunto = s.includes('.');
  const hasComa  = s.includes(',');
  if (hasPunto && hasComa) {
    const lastPunto = s.lastIndexOf('.');
    const lastComa  = s.lastIndexOf(',');
    if (lastComa > lastPunto) { s = s.replace(/\./g, '').replace(',', '.'); }
    else { s = s.replace(/,/g, ''); }
  } else if (hasComa && !hasPunto) {
    s = s.replace(',', '.');
  } else if (hasPunto && !hasComa) {
    const partes = s.split('.');
    const ultimaParte = partes[partes.length - 1];
    if (partes.length > 1 && ultimaParte.length === 3) { s = s.replace(/\./g, ''); }
  }
  const n = parseFloat(s);
  const result = isNaN(n) ? 0 : n;
  return neg ? -result : result;
}

function fmt(v, short = false) {
  if (short && Math.abs(v) >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
  if (short && Math.abs(v) >= 1000) return '$' + Math.round(v/1000) + 'K';
  return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(v);
}

function processData(rows) {
  if (!rows || rows.length < 2) { document.getElementById('main-content').classList.add('active'); return; }

  const headers = rows[0];
  let data = rows.slice(1).filter(r => r && (r[0] || r[1]));

  const findCol = (keys) => headers.findIndex(h => keys.some(k => (h||'').toLowerCase().includes(k.toLowerCase())));

  const idx = {
    total:    findCol(['total', 'monto', 'venta']),
    margen:   findCol(['margen', 'ganancia', 'neto']),
    costo:    findCol(['costo']),
    fecha:    findCol(['fecha']),
    hora:     findCol(['hora']),
    origen:   findCol(['origen', 'canal']),
    pago:     findCol(['pago', 'forma']),
    producto: findCol(['producto', 'item', 'descripcion']),
    ticket:   findCol(['ticket', 'pedido', 'orden', 'numero', 'nro']),
  };

  // ============================================================
  // FILTRO DE FECHA (Histórico)
  // ============================================================
  if (activeSheet === 'Historico') {
    const f = document.getElementById('date-from').value;
    const t = document.getElementById('date-to').value;
    if (f && t) {
      const dF = new Date(f + 'T00:00:00');
      const dT = new Date(t + 'T23:59:59');
      data = data.filter(r => {
        const raw = r[idx.fecha];
        if (!raw) return false;
        let d;
        if (String(raw).includes('/')) {
          const parts = String(raw).split('/');
          d = new Date(`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`);
        } else {
          d = new Date(raw);
        }
        return d >= dF && d <= dT;
      });
    }
  }

  // ============================================================
  // FILTRO CLAVE: SOLO FILAS CON TOTAL > 0
  // Filas con total = 0 o sin total NO se consideran ventas reales
  // ============================================================
  if (idx.total >= 0) {
    data = data.filter(r => {
      const v = parse(r[idx.total]);
      return v > 0;
    });
  }

  const ticketSet = new Set();
  let totalTickets = 0;
  let tVenta = 0, tMargen = 0;
  let tManana = 0, cManana = 0, tNoche = 0, cNoche = 0;
  const origenes = {}, pagos = {}, prods = {}, prodsMargen = {}, horas = {};

  let tieneMargen = idx.margen >= 0;
  let tieneCosto = idx.costo >= 0;

  data.forEach(r => {
    const venta = idx.total >= 0 ? parse(r[idx.total]) : 0;

    let margen = 0;
    if (tieneMargen) {
      margen = parse(r[idx.margen]);
      if (margen < 0 || margen > venta * 2) margen = venta * 0.35;
    } else if (tieneCosto) {
      const costo = parse(r[idx.costo]);
      margen = venta - costo;
    }

    tVenta  += venta;
    tMargen += margen;

    if (idx.ticket >= 0 && r[idx.ticket]) {
      const tid = String(r[idx.ticket]).trim();
      if (!ticketSet.has(tid)) { ticketSet.add(tid); totalTickets++; }
    } else {
      totalTickets++;
    }

    const horaRaw = r[idx.hora] ? String(r[idx.hora]).trim() : '';
    let horaNum = NaN;
    if (horaRaw.includes(':')) horaNum = parseInt(horaRaw.split(':')[0]);
    else horaNum = parseInt(horaRaw);

    if (!isNaN(horaNum)) {
      if (horaNum < 17) { tManana += venta; cManana++; }
      else              { tNoche  += venta; cNoche++; }
      horas[horaNum] = (horas[horaNum] || 0) + venta;
    }

    if (idx.origen >= 0) {
      let org = String(r[idx.origen] || '').trim();
      if (!org || org === '0') org = 'Local';
      origenes[org] = (origenes[org] || 0) + venta;
    }

    if (idx.pago >= 0) {
      const pg = String(r[idx.pago] || 'Otro').trim() || 'Otro';
      pagos[pg] = (pagos[pg] || 0) + venta;
    }

    if (idx.producto >= 0 && r[idx.producto]) {
      const pr = String(r[idx.producto]).trim();
      prods[pr]       = (prods[pr] || 0) + 1;
      prodsMargen[pr] = (prodsMargen[pr] || 0) + margen;
    }
  });

  if (totalTickets === 0) totalTickets = data.length;

  const ticketProm = totalTickets > 0 ? tVenta / totalTickets : 0;
  const margenPct  = tVenta > 0 ? (tMargen / tVenta * 100) : 0;

  // Guardar stats globales para Estrategia
  globalStats = { ticketProm, totalTickets, tVenta, tMargen, margenPct };

  // ============================================================
  // KPIs
  // ============================================================
  document.getElementById('kpi-container').innerHTML = `
    <div class="kpi">
      <div class="kpi-icon">💰</div>
      <div class="kpi-lbl">Venta Total</div>
      <div class="kpi-val">${fmt(tVenta, true)}</div>
      <div class="kpi-sub">${fmt(tVenta)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">🌿</div>
      <div class="kpi-lbl">Ganancia</div>
      <div class="kpi-val" style="color:var(--g)">${fmt(tMargen, true)}</div>
      <div class="kpi-sub">${margenPct.toFixed(1)}% de margen</div>
    </div>
    <div class="kpi accent-red">
      <div class="kpi-icon">🎫</div>
      <div class="kpi-lbl">Tickets (ventas reales)</div>
      <div class="kpi-val">${totalTickets.toLocaleString('es-AR')}</div>
      <div class="kpi-sub">${data.length} filas con total &gt; 0</div>
    </div>
    <div class="kpi accent-amber">
      <div class="kpi-icon">🛒</div>
      <div class="kpi-lbl">Ticket Promedio</div>
      <div class="kpi-val">${fmt(ticketProm, true)}</div>
      <div class="kpi-sub">${fmt(ticketProm)}</div>
    </div>
    <div class="kpi accent-blue">
      <div class="kpi-icon">📈</div>
      <div class="kpi-lbl">Margen %</div>
      <div class="kpi-val" style="color:var(--blue)">${margenPct.toFixed(1)}%</div>
      <div class="kpi-sub">Sobre ventas totales</div>
    </div>

function recalcProyeccion() {
  const tp    = parseFloat(document.getElementById('inp-tp').value) || 0;
  const tkt   = parseFloat(document.getElementById('inp-tkt').value) || 1;
  const rCon  = (parseFloat(document.getElementById('inp-con').value) || 3) / 100;
  const rOpt  = (parseFloat(document.getElementById('inp-opt').value) || 8) / 100;

  const meses = ['Mes 1','Mes 2','Mes 3','Mes 4','Mes 5','Mes 6'];
  const base   = tp * tkt;
  const conData = meses.map((_, i) => Math.round(base * Math.pow(1 + rCon, i + 1)));
  const optData = meses.map((_, i) => Math.round(base * Math.pow(1 + rOpt, i + 1)));

  // Tickets proyectados por escenario
  const conTkt = meses.map((_, i) => Math.round(tkt * Math.pow(1 + rCon/2, i + 1)));
  const optTkt = meses.map((_, i) => Math.round(tkt * Math.pow(1 + rOpt/2, i + 1)));
  const conTP  = meses.map((_, i) => Math.round(tp * Math.pow(1 + rCon/2, i + 1)));
  const optTP  = meses.map((_, i) => Math.round(tp * Math.pow(1 + rOpt/2, i + 1)));

  // Chart
  if (myCharts.proyeccion) { myCharts.proyeccion.destroy(); delete myCharts.proyeccion; }
  const ctx = document.getElementById('chartProyeccion');
  if (!ctx) return;

  const datasets = [
    { label: 'Conservador', data: conData, borderColor: '#e8840c', backgroundColor: 'rgba(232,132,12,0.1)', borderWidth: 2.5, tension: 0.35, fill: true, pointRadius: 5, pointBackgroundColor: '#e8840c' },
    { label: 'Optimista',   data: optData, borderColor: '#1a7a43', backgroundColor: 'rgba(26,122,67,0.1)',  borderWidth: 2.5, tension: 0.35, fill: true, pointRadius: 5, pointBackgroundColor: '#1a7a43' },
  ];
  if (globalStats.tVenta > 0) {
    datasets.push({ label: 'Real', data: [globalStats.tVenta, null, null, null, null, null], borderColor: '#1a63b5', borderDash: [6, 4], borderWidth: 2, pointRadius: 7, pointBackgroundColor: '#1a63b5', fill: false, tension: 0 });
  }

  myCharts.proyeccion = new Chart(ctx, {
    type: 'line',
    data: { labels: meses, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)}` } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { family: 'DM Sans', size: 12 }, color: '#6b7c6e' } },
        y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { family: 'DM Sans', size: 11 }, color: '#6b7c6e', callback: v => fmt(v, true) } }
      }
    }
  });

  // Tabla proyección
  const tabla = document.getElementById('tabla-proyeccion');
  if (tabla) {
    tabla.innerHTML = `
      <table class="contraste-table">
        <thead>
          <tr>
            <th>Mes</th>
            <th style="text-align:right;">Ventas (con.)</th>
            <th style="text-align:right;">Tickets (con.)</th>
            <th style="text-align:right;">T. Prom (con.)</th>
            <th style="text-align:right;">Ventas (opt.)</th>
            <th style="text-align:right;">Tickets (opt.)</th>
            <th style="text-align:right;">T. Prom (opt.)</th>
          </tr>
        </thead>
        <tbody>
          ${meses.map((m, i) => `
            <tr>
              <td><strong>${m}</strong></td>
              <td class="num" style="color:var(--amber)">${fmt(conData[i], true)}</td>
              <td class="num">${conTkt[i].toLocaleString('es-AR')}</td>
              <td class="num">${fmt(conTP[i], true)}</td>
              <td class="num" style="color:var(--g)">${fmt(optData[i], true)}</td>
              <td class="num">${optTkt[i].toLocaleString('es-AR')}</td>
              <td class="num">${fmt(optTP[i], true)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    `;
  }

  // Contraste real vs proyectado
  const contraste = document.getElementById('contraste-content');
  if (contraste) {
    if (!globalStats.tVenta) {
      contraste.innerHTML = `<div class="no-data" style="padding:32px;text-align:center;color:var(--muted);">Cargá primero los datos de Hoy o Histórico para ver el contraste real vs proyectado.</div>`;
    } else {
      const real = globalStats.tVenta;
      const realTkt = globalStats.totalTickets;
      const realTP  = globalStats.ticketProm;
      const meta1 = conData[0];
      const meta2 = optData[0];
      const vsConPct = ((real - meta1) / meta1 * 100);
      const vsOptPct = ((real - meta2) / meta2 * 100);

      contraste.innerHTML = `
        <table class="contraste-table">
          <thead>
            <tr>
              <th>Métrica</th>
              <th style="text-align:right;"><span class="escenario-badge badge-real">Real</span></th>
              <th style="text-align:right;"><span class="escenario-badge badge-con">Conservador M1</span></th>
              <th style="text-align:right;">vs Conservador</th>
              <th style="text-align:right;"><span class="escenario-badge badge-opt">Optimista M1</span></th>
              <th style="text-align:right;">vs Optimista</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Venta Total</td>
              <td class="num" style="color:var(--blue)">${fmt(real, true)}</td>
              <td class="num" style="color:var(--amber)">${fmt(meta1, true)}</td>
              <td class="num ${vsConPct >= 0 ? 'vs-pos' : 'vs-neg'}">${vsConPct >= 0 ? '+' : ''}${vsConPct.toFixed(1)}%</td>
              <td class="num" style="color:var(--g)">${fmt(meta2, true)}</td>
              <td class="num ${vsOptPct >= 0 ? 'vs-pos' : 'vs-neg'}">${vsOptPct >= 0 ? '+' : ''}${vsOptPct.toFixed(1)}%</td>
            </tr>
            <tr>
              <td>Tickets vendidos</td>
              <td class="num" style="color:var(--blue)">${realTkt.toLocaleString('es-AR')}</td>
              <td class="num" style="color:var(--amber)">${conTkt[0].toLocaleString('es-AR')}</td>
              <td class="num ${realTkt >= conTkt[0] ? 'vs-pos' : 'vs-neg'}">${realTkt >= conTkt[0] ? '+' : ''}${((realTkt - conTkt[0])/conTkt[0]*100).toFixed(1)}%</td>
              <td class="num" style="color:var(--g)">${optTkt[0].toLocaleString('es-AR')}</td>
              <td class="num ${realTkt >= optTkt[0] ? 'vs-pos' : 'vs-neg'}">${realTkt >= optTkt[0] ? '+' : ''}${((realTkt - optTkt[0])/optTkt[0]*100).toFixed(1)}%</td>
            </tr>
            <tr>
              <td>Ticket promedio</td>
              <td class="num" style="color:var(--blue)">${fmt(realTP, true)}</td>
              <td class="num" style="color:var(--amber)">${fmt(conTP[0], true)}</td>
              <td class="num ${realTP >= conTP[0] ? 'vs-pos' : 'vs-neg'}">${realTP >= conTP[0] ? '+' : ''}${((realTP - conTP[0])/conTP[0]*100).toFixed(1)}%</td>
              <td class="num" style="color:var(--g)">${fmt(optTP[0], true)}</td>
              <td class="num ${realTP >= optTP[0] ? 'vs-pos' : 'vs-neg'}">${realTP >= optTP[0] ? '+' : ''}${((realTP - optTP[0])/optTP[0]*100).toFixed(1)}%</td>
            </tr>
          </tbody>
        </table>
        <div style="margin-top:16px;padding:14px 16px;background:var(--bg);border-radius:12px;font-size:13px;color:var(--muted);">
          💡 <strong style="color:var(--ink);">Cómo leer esta tabla:</strong> si el real es mayor que la proyección → verde (superaste la meta). Si es menor → rojo (hay oportunidad de mejora). Ajustá los parámetros arriba para modelar distintos escenarios.
        </div>
      `;
    }
  }
}

function setTab(name, el) {
  activeSheet = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('historico-filters').style.display = name === 'Historico' ? 'flex' : 'none';

  if (name === 'Estrategia') {
    document.getElementById('main-content').classList.add('active');
    renderEstrategia();
    return;
  }
  if (gapi.client?.sheets) loadData();
}
</script>
</body>
</html>
