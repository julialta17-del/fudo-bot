<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG SALADS · Dashboard Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f0ede6; --green: #2a7d40; --green-dark: #1a5430;
            --orange: #e05a1a; --muted: #7a9a82; --border: #c8dcc8;
            --bebas: 'Bebas Neue', cursive; --sans: 'Outfit', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
        body { background: var(--bg); font-family: var(--sans); color: #1a2e1e; padding-bottom: 50px; }
        header { background: var(--green-dark); padding: 0 30px; display: flex; align-items: center; justify-content: space-between; height: 70px; color: white; position: sticky; top:0; z-index:100; }
        
        /* Tabs */
        .tabs-wrap { background: var(--green-dark); padding: 0 30px; display: flex; gap: 5px; border-bottom: 4px solid rgba(255,255,255,0.1); position: sticky; top:70px; z-index:99; }
        .tab { padding: 15px 25px; font-family: var(--bebas); font-size: 16px; color: rgba(255,255,255,0.5); cursor: pointer; border: none; background: none; transition: 0.3s; }
        .tab.active { color: white; border-bottom: 4px solid #5dbf72; background: rgba(255,255,255,0.05); }

        /* Filtros */
        .filter-bar { background: white; padding: 15px 30px; border-bottom: 1px solid var(--border); display: none; gap: 15px; align-items: center; flex-wrap: wrap; }
        .filter-bar.active { display: flex; }
        .filter-group { display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono'; font-size: 11px; }
        input[type="date"], select { padding: 6px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; }

        main { padding: 20px 30px; max-width: 1600px; margin: 0 auto; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi { background: white; padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .kpi-lbl { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
        .kpi-val { font-family: var(--bebas); font-size: 38px; color: var(--green-dark); line-height: 1; }
        
        .card { background: white; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; overflow: hidden; }
        .card-head { padding: 15px 20px; background: #f8fbf8; border-bottom: 1px solid var(--border); font-family: var(--bebas); font-size: 20px; color: var(--green-dark); display: flex; justify-content: space-between; }
        
        .grid-charts { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #f1f1f1; padding: 12px; text-align: left; font-family: 'JetBrains Mono'; position: sticky; top: 0; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; }

        #loader { position: fixed; inset: 0; background: var(--green-dark); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: var(--bebas); font-size: 24px; }
        #loader.on { display: flex; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #5dbf72; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 1000px) { .grid-charts { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loader" class="on"><div class="spinner"></div>CONECTANDO CON BIG SALADS...</div>

<header>
    <div style="font-family: var(--bebas); font-size: 28px;">BIG SALADS <span style="color:#5dbf72">SEXTA</span></div>
    <button onclick="fullRefresh()" style="background:#5dbf72; color:white; border:none; padding:8px 15px; border-radius:6px; font-family:var(--bebas); cursor:pointer;">REFRESCAR DATOS</button>
</header>

<div class="tabs-wrap" id="tabsWrap"></div>

<div class="filter-bar" id="filterBar">
    <div class="filter-group">
        <label>DESDE:</label>
        <input type="date" id="dateFrom" onchange="renderAll()">
    </div>
    <div class="filter-group">
        <label>HASTA:</label>
        <input type="date" id="dateTo" onchange="renderAll()">
    </div>
    <div class="filter-group">
        <label>ORIGEN:</label>
        <select id="filterOrigen" onchange="renderAll()">
            <option value="TODOS">TODOS</option>
            <option value="Local">LOCAL</option>
            <option value="Pedidos Ya">PEDIDOS YA</option>
        </select>
    </div>
</div>

<main>
    <div id="kpiContainer" class="kpi-grid"></div>
    
    <div class="grid-charts">
        <div class="card">
            <div class="card-head"><span id="chartTitle">VENTAS</span></div>
            <div style="padding:20px;"><canvas id="chartMain" height="300"></canvas></div>
        </div>
        <div class="card">
            <div class="card-head">PROYECCIÓN SEMESTRAL</div>
            <div style="padding:20px;"><canvas id="chartProj" height="300"></canvas></div>
        </div>
    </div>

    <div class="card">
        <div class="card-head">
            <span>LISTADO DE OPERACIONES</span>
            <span id="rowCount" style="font-size: 12px; font-family: 'JetBrains Mono'; color: var(--muted);"></span>
        </div>
        <div style="overflow-x:auto; max-height: 500px;">
            <table><thead><tr id="tHead"></tr></thead><tbody id="tBody"></tbody></table>
        </div>
    </div>
</main>

<script>
const PUB_ID = '2PACX-1vSqXw7W2kUj_BsUyLKYmRIIZyYacKR9nYbaeXRFqSPzBVZuyCuj7Vl_Cf13tTTJAq9jGVXudNqWfiiC';
let sheets = [];
let active = 'Hoja 1';
let charts = {};

const $ = id => document.getElementById(id);
const fmt = v => new Intl.NumberFormat('es-AR', {style: 'currency', currency: 'ARS', maximumFractionDigits: 0}).format(v);

// Helper para parsear fechas DD/MM/YYYY a Objeto Date
function parseFecha(str) {
    if(!str) return null;
    const p = str.split('/');
    return new Date(p[2], p[1]-1, p[0]);
}

async function loadSheet(name) {
    const url = `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?output=csv&sheet=${encodeURIComponent(name)}&_=${Date.now()}`;
    const response = await fetch(url);
    const data = await response.text();
    const rows = data.split('\n').map(line => {
        const result = [];
        let cur = '', inQ = false;
        for(let char of line) {
            if(char === '"') inQ = !inQ;
            else if(char === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim());
        return result;
    });
    return { name, headers: rows[0], rows: rows.slice(1).filter(r => r.length > 5) };
}

function renderAll() {
    const current = sheets.find(s => s.name === active);
    if (!current) return;

    const h = current.headers;
    let rows = current.rows;
    
    const idx = {
        fecha: h.findIndex(x => x === 'Fecha'),
        total: h.findIndex(x => x === 'Total'),
        margen: h.findIndex(x => x === 'Margen_Neto_$'),
        origen: h.findIndex(x => x === 'Origen')
    };

    // Aplicar Filtros solo si estamos en Historico
    if (active === 'Historico') {
        $('filterBar').classList.add('active');
        const from = $('dateFrom').value ? new Date($('dateFrom').value + "T00:00:00") : null;
        const to = $('dateTo').value ? new Date($('dateTo').value + "T23:59:59") : null;
        const ori = $('filterOrigen').value;

        rows = rows.filter(r => {
            const f = parseFecha(r[idx.fecha]);
            const matchDate = (!from || f >= from) && (!to || f <= to);
            const matchOri = ori === 'TODOS' || r[idx.origen] === ori;
            return matchDate && matchOri;
        });
    } else {
        $('filterBar').classList.remove('active');
    }

    // Actualizar Tabla
    $('tHead').innerHTML = h.map(title => `<th>${title}</th>`).join('');
    $('tBody').innerHTML = rows.slice(-50).reverse().map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
    $('rowCount').textContent = `${rows.length} registros`;

    if (active === 'Historico') {
        renderHistorico(rows, idx);
    } else {
        renderDia(rows, idx);
    }
}

function renderDia(rows, idx) {
    const totalV = rows.reduce((a, b) => a + (parseFloat(b[idx.total]) || 0), 0);
    const totalM = rows.reduce((a, b) => a + (parseFloat(b[idx.margen]) || 0), 0);
    
    $('chartTitle').textContent = "ÚLTIMOS PEDIDOS CARGADOS";
    $('kpiContainer').innerHTML = `
        <div class="kpi"><div class="kpi-lbl">VENTA HOJA</div><div class="kpi-val">${fmt(totalV)}</div></div>
        <div class="kpi"><div class="kpi-lbl">MARGEN HOJA</div><div class="kpi-val" style="color:var(--green)">${fmt(totalM)}</div></div>
        <div class="kpi"><div class="kpi-lbl">PEDIDOS</div><div class="kpi-val">${rows.length}</div></div>
        <div class="kpi"><div class="kpi-lbl">TICKET PROM.</div><div class="kpi-val">${fmt(totalV/rows.length)}</div></div>
    `;

    updateChart('chartMain', 'bar', rows.slice(-15).map((_,i)=>i+1), [
        { label: 'Venta $', data: rows.slice(-15).map(r => parseFloat(r[idx.total])), backgroundColor: '#3a9e52' }
    ]);
}

function renderHistorico(rows, idx) {
    $('chartTitle').textContent = "ANÁLISIS TEMPORAL FILTRADO";
    
    // Agrupar por mes para el gráfico y KPIs
    const totalV = rows.reduce((a,b) => a + (parseFloat(b[idx.total]) || 0), 0);
    const totalM = rows.reduce((a,b) => a + (parseFloat(b[idx.margen]) || 0), 0);

    $('kpiContainer').innerHTML = `
        <div class="kpi"><div class="kpi-lbl">VENTA PERIODO</div><div class="kpi-val">${fmt(totalV)}</div></div>
        <div class="kpi"><div class="kpi-lbl">MARGEN NETO</div><div class="kpi-val" style="color:var(--green)">${fmt(totalM)}</div></div>
        <div class="kpi"><div class="kpi-lbl">% RENTABILIDAD</div><div class="kpi-val">${((totalM/totalV)*100 || 0).toFixed(1)}%</div></div>
        <div class="kpi"><div class="kpi-lbl">TICKET PROM.</div><div class="kpi-val">${fmt(totalV/rows.length || 0)}</div></div>
    `;

    // Lógica de gráfico por días si el rango es corto, o por meses si es largo
    const grouping = {};
    rows.forEach(r => {
        const f = r[idx.fecha]; // DD/MM/YYYY
        if(!grouping[f]) grouping[f] = 0;
        grouping[f] += parseFloat(r[idx.total]) || 0;
    });

    const labels = Object.keys(grouping);
    const dataV = Object.values(grouping);

    updateChart('chartMain', 'line', labels, [
        { label: 'Venta Diaria', data: dataV, borderColor: '#2a7d40', tension: 0.3, fill: true, backgroundColor: 'rgba(42,125,64,0.1)' }
    ]);

    // Proyección (Se mantiene sobre el histórico total para no perder tendencia)
    const avg = totalV / (labels.length || 1);
    updateChart('chartProj', 'line', ['P1','P2','P3','P4','P5','P6'], [
        { label: 'Proyección $', data: Array(6).fill(0).map((_,i)=> avg * 30 * (1+(i*0.01))), borderColor: '#e05a1a', borderDash: [5,5] }
    ]);
}

function updateChart(id, type, labels, datasets) {
    if(charts[id]) charts[id].destroy();
    charts[id] = new Chart($(id), {
        type: type,
        data: { labels, datasets },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

async function fullRefresh() {
    $('loader').classList.add('on');
    try {
        const [h1, hist] = await Promise.all([loadSheet('Hoja 1'), loadSheet('Historico')]);
        sheets = [h1, hist];
        $('tabsWrap').innerHTML = sheets.map(s => `
            <button class="tab ${active === s.name ? 'active' : ''}" onclick="changeTab('${s.name}')">${s.name.toUpperCase()}</button>
        `).join('');
        renderAll();
    } catch (e) { alert("Error de conexión con Sheets."); }
    $('loader').classList.remove('on');
}

function changeTab(name) {
    active = name;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === name.toUpperCase()));
    renderAll();
}

window.onload = fullRefresh;
</script>
</body>
</html>
