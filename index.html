<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG SALADS SEXTA · Dashboard Multi-Hoja</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f0ede6; --bg1: #e8e4db; --white: #ffffff; --card: #ffffff;
            --green: #2a7d40; --green2: #3a9e52; --green3: #5dbf72; --green-bg: #e8f5ec; --green-dark: #1a5430;
            --orange: #e05a1a; --orange-bg: #fef0e8; --yellow: #f5c030; --yellow-bg: #fef8e0;
            --red: #d94040; --red-bg: #fde8e8; --text: #1a2e1e; --text2: #3a5040;
            --muted: #7a9a82; --border: #c8dcc8; --border2: #a8c8a8;
            --shadow: 0 2px 12px rgba(42,125,64,0.08); --shadow-lg: 0 8px 32px rgba(42,125,64,0.12);
            --bebas: 'Bebas Neue', cursive; --sans: 'Outfit', sans-serif; --mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
        body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
        header { position: sticky; top: 0; z-index: 100; background: var(--green-dark); padding: 0 36px; display: flex; align-items: center; justify-content: space-between; height: 68px; box-shadow: 0 2px 20px rgba(0,0,0,0.2); }
        .brand { display: flex; align-items: center; gap: 14px; }
        .brand-logo { width: 42px; height: 42px; border-radius: 10px; background: var(--green2); display: flex; align-items: center; justify-content: center; font-size: 22px; border: 2px solid rgba(255,255,255,0.2); }
        .brand-name { font-family: var(--bebas); font-size: 26px; letter-spacing: 2px; color: #ffffff; }
        .brand-name span { color: var(--green3); }
        
        .tabs-wrap { background: var(--green-dark); border-bottom: 3px solid rgba(255,255,255,0.08); padding: 0 36px; display: flex; gap: 2px; overflow-x: auto; }
        .tab { padding: 12px 20px; font-family: var(--bebas); font-size: 14px; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
        .tab.active { color: #fff; border-bottom-color: var(--green3); background: rgba(255,255,255,0.05); }
        
        main { padding: 28px 36px; max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; gap: 28px; }
        .sec { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .sec-title { font-family: var(--bebas); font-size: 18px; letter-spacing: 2px; color: var(--green-dark); }
        .sec-line { flex: 1; height: 1px; background: var(--border); }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .kpi { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); position: relative; }
        .kpi-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
        .kpi-val { font-family: var(--bebas); font-size: 40px; color: var(--text); }
        .kpi-val .u { font-size: 20px; color: var(--muted); }
        
        .card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
        .card-head { padding: 18px 22px; border-bottom: 1px solid var(--bg1); display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-family: var(--bebas); font-size: 20px; color: var(--green-dark); }
        .chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
        
        .month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
        .mc { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
        .mc-month { font-family: var(--bebas); font-size: 22px; color: var(--green-dark); }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg1); padding: 10px; font-family: var(--mono); font-size: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid var(--bg1); font-size: 12px; }
        
        .loader-ring { width: 48px; height: 48px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); border-top-color: #6be082; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader { position: fixed; inset: 0; background: rgba(26, 84, 48, 0.9); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; gap: 15px; }
        #loader.on { display: flex; }

        @media (max-width: 900px) { .kpi-grid, .chart-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loader" class="on">
    <div class="loader-ring"></div>
    <div id="loaderTxt">COCINANDO DATOS...</div>
</div>

<header>
    <div class="brand">
        <div class="brand-logo">🥗</div>
        <div class="brand-name">BIG <span>SALADS</span> SEXTA</div>
    </div>
    <button class="tab" onclick="fullRefresh()" style="color:white; border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:8px 15px;">ACTUALIZAR</button>
</header>

<div class="tabs-wrap" id="tabsWrap"></div>

<main>
    <div id="dashboardContent">
        <div class="sec">
            <div class="sec-title" id="mainTitle">RESUMEN GENERAL</div>
            <div class="sec-line"></div>
            <div id="kpiNote" style="font-family:var(--mono); font-size:10px; color:var(--muted);"></div>
        </div>

        <div class="kpi-grid">
            <div class="kpi">
                <div class="kpi-lbl">VENTAS TOTALES</div>
                <div class="kpi-val" id="kTotal"><span class="u">$</span>—</div>
                <div id="kTotalSub" style="font-size:11px; color:var(--muted);">Cargando...</div>
            </div>
            <div class="kpi">
                <div class="kpi-lbl">MARGEN ESTIMADO</div>
                <div class="kpi-val" id="kMargen"><span class="u">$</span>—</div>
            </div>
            <div class="kpi">
                <div class="kpi-lbl">TICKET PROMEDIO</div>
                <div class="kpi-val" id="kAvgTicket"><span class="u">$</span>—</div>
                <div id="kTickets" style="font-size:11px; color:var(--muted);">— ventas</div>
            </div>
        </div>

        <div class="chart-row" id="rowPrincipal">
            <div class="card">
                <div class="card-head"><div class="card-title">EVOLUCIÓN TEMPORAL</div></div>
                <div style="padding:20px;"><canvas id="chartMain" height="250"></canvas></div>
            </div>
            <div class="card">
                <div class="card-head"><div class="card-title">PROYECCIÓN</div></div>
                <div style="padding:20px;"><canvas id="chartProj" height="250"></canvas></div>
            </div>
        </div>

        <div class="sec"><div class="sec-title">DESGLOSE POR MES</div><div class="sec-line"></div></div>
        <div class="month-grid" id="monthGrid"></div>

        <div class="sec"><div class="sec-title">DATOS DE LA HOJA</div><div class="sec-line"></div></div>
        <div class="card" style="overflow-x:auto;">
            <table id="dataTable">
                <thead id="tHead"></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
const PUB_ID = '2PACX-1vSqXw7W2kUj_BsUyLKYmRIIZyYacKR9nYbaeXRFqSPzBVZuyCuj7Vl_Cf13tTTJAq9jGVXudNqWfiiC';
let sheets = [];
let active = 'Hoja 1';
let ch = {};
let map = { date: null, value: null, cat: null };

const $ = id => document.getElementById(id);
const fmt = n => new Intl.NumberFormat('es-AR').format(Math.round(n || 0));

async function loadSheet(name) {
    const url = `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?output=csv&sheet=${encodeURIComponent(name)}&_=${Date.now()}`;
    const r = await fetch(url);
    const txt = await r.text();
    const rows = txt.split('\n').map(row => row.split(',').map(c => c.trim().replace(/"/g,'')));
    return { name, headers: rows[0], rows: rows.slice(1).filter(r => r.length > 1 && r[0] !== '') };
}

function autoDetect(headers) {
    const h = headers.map(x => x.toLowerCase());
    return {
        date: h.findIndex(x => x.includes('fecha')),
        value: h.findIndex(x => x.includes('total') || x.includes('monto')),
        cat: h.findIndex(x => x.includes('producto') || x.includes('categoria'))
    };
}

function renderAll() {
    const data = sheets.find(s => s.name === active);
    if (!data) return;
    
    map = autoDetect(data.headers);
    const rows = data.rows;
    
    // TABLA
    $('tHead').innerHTML = `<tr>${data.headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
    $('tBody').innerHTML = rows.slice(-20).reverse().map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');

    if (active === 'Historico') {
        renderHistorico(rows);
    } else {
        renderDia(rows);
    }
}

function renderDia(rows) {
    $('mainTitle').textContent = "RESUMEN DEL DÍA (HOJA 1)";
    const total = rows.reduce((a, b) => a + (parseFloat(b[map.value]) || 0), 0);
    $('kTotal').innerHTML = `<span class="u">$</span>${fmt(total)}`;
    $('kTotalSub').textContent = "Venta acumulada en la hoja";
    $('kAvgTicket').innerHTML = `<span class="u">$</span>${fmt(total / (rows.length || 1))}`;
    $('kTickets').textContent = `${rows.length} ventas registradas`;

    // Gráfico de barras por registro
    if(ch.main) ch.main.destroy();
    ch.main = new Chart($('chartMain'), {
        type: 'bar',
        data: {
            labels: rows.slice(-15).map((_, i) => i + 1),
            datasets: [{ label: 'Venta', data: rows.slice(-15).map(r => r[map.value]), backgroundColor: '#3a9e52' }]
        }
    });
}

function renderHistorico(rows) {
    $('mainTitle').textContent = "ANÁLISIS HISTÓRICO GLOBAL";
    
    // Agrupar por mes
    const stats = {};
    rows.forEach(r => {
        const d = r[map.date] ? r[map.date].split('/')[1] + '/' + r[map.date].split('/')[2] : 'S/D';
        if (!stats[d]) stats[d] = { total: 0, count: 0 };
        stats[d].total += (parseFloat(r[map.value]) || 0);
        stats[d].count++;
    });

    const labels = Object.keys(stats);
    const values = Object.values(stats).map(s => s.total);

    // KPIs
    const totalH = values.reduce((a, b) => a + b, 0);
    $('kTotal').innerHTML = `<span class="u">$</span>${fmt(totalH)}`;
    $('kTotalSub').textContent = "Ventas totales históricas";
    
    // Gráfico Histórico
    if(ch.main) ch.main.destroy();
    ch.main = new Chart($('chartMain'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{ label: 'Venta Mensual', data: values, borderColor: '#2a7d40', tension: 0.3, fill: true, backgroundColor: 'rgba(42,125,64,0.1)' }]
        }
    });

    // Proyección simple 6 meses
    const avg = totalH / (labels.length || 1);
    const proy = [];
    for(let i=1; i<=6; i++) proy.push(avg * (0.9 + Math.random() * 0.2));

    if(ch.proj) ch.proj.destroy();
    ch.proj = new Chart($('chartProj'), {
        type: 'line',
        data: {
            labels: [...labels.slice(-3), 'P1', 'P2', 'P3', 'P4', 'P5', 'P6'],
            datasets: [{ label: 'Proyección', data: [...Array(3).fill(null), ...proy], borderColor: '#e05a1a', borderDash: [5,5] }]
        }
    });

    // Month Grid
    $('monthGrid').innerHTML = labels.reverse().map(l => `
        <div class="mc">
            <div class="mc-month">${l}</div>
            <div style="font-size:18px; font-weight:bold; color:var(--green);">$${fmt(stats[l].total)}</div>
            <div style="font-size:11px; color:var(--muted);">${stats[l].count} tickets · $${fmt(stats[l].total/stats[l].count)} prom.</div>
        </div>
    `).join('');
}

async function fullRefresh() {
    $('loader').classList.add('on');
    try {
        const h1 = await loadSheet('Hoja 1');
        const hist = await loadSheet('Historico');
        sheets = [h1, hist];
        
        $('tabsWrap').innerHTML = sheets.map(s => `
            <button class="tab ${active === s.name ? 'active' : ''}" onclick="active='${s.name}'; renderAll(); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); this.classList.add('active');">
                ${s.name.toUpperCase()}
            </button>
        `).join('');
        
        renderAll();
    } catch (e) { alert("Error cargando datos. Verifica que la planilla esté publicada."); }
    $('loader').classList.remove('on');
}

window.onload = fullRefresh;
</script>
</body>
</html>
