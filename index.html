<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIG SALADS SEXTA · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0ede6; --bg1: #e8e4db; --white: #ffffff; --card: #ffffff; --green: #2a7d40; --green2: #3a9e52; --green3: #5dbf72; --green-bg: #e8f5ec; --green-dark: #1a5430; --orange: #e05a1a; --orange-bg: #fef0e8; --yellow: #f5c030; --yellow-bg: #fef8e0; --red: #d94040; --red-bg: #fde8e8; --text: #1a2e1e; --text2: #3a5040; --muted: #7a9a82; --border: #c8dcc8; --shadow: 0 2px 12px rgba(42,125,64,0.08); --bebas: 'Bebas Neue', cursive; --sans: 'Outfit', sans-serif; --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
header { position: sticky; top: 0; z-index: 100; background: var(--green-dark); padding: 0 36px; display: flex; align-items: center; justify-content: space-between; height: 68px; box-shadow: 0 2px 20px rgba(0,0,0,0.2); }
.brand-name { font-family: var(--bebas); font-size: 26px; letter-spacing: 2px; color: #ffffff; }
.brand-name span { color: var(--green3); }
.tabs-wrap { background: var(--green-dark); border-bottom: 3px solid rgba(255,255,255,0.08); padding: 0 36px; display: flex; gap: 2px; }
.tab { padding: 12px 22px; font-family: var(--bebas); font-size: 15px; color: rgba(255,255,255,0.4); cursor: pointer; border: none; background: none; transition: 0.2s; border-bottom: 3px solid transparent; }
.tab.active { color:#fff; border-bottom-color: var(--green3); background: rgba(255,255,255,0.05); }
main { padding: 28px 36px 60px; display: flex; flex-direction: column; gap: 28px; max-width: 1600px; margin: 0 auto; }
.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.kpi { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: var(--shadow); position: relative; overflow: hidden; animation: up 0.4s ease both; }
.kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background: var(--kc, var(--green)); }
.kpi[data-c=yellow] { --kc: var(--yellow); }
.kpi-val { font-family: var(--bebas); font-size: 44px; color: var(--text); line-height: 1; margin-top: 5px; }
.kpi-val .u { font-size: 20px; color: var(--muted); }
.card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
.card-head { padding: 18px 22px; border-bottom: 1px solid var(--bg1); font-family: var(--bebas); font-size: 20px; color: var(--green-dark); display: flex; justify-content: space-between; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; margin-top: 15px; }
.mc { background: #fff; padding: 18px; border-radius: 14px; border: 1px solid var(--border); }
.tscroll { overflow: auto; max-height: 450px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { position: sticky; top: 0; background: var(--bg1); padding: 12px; text-align: left; font-family: var(--mono); font-size: 10px; z-index: 10; }
td { padding: 10px 12px; border-bottom: 1px solid var(--bg1); }
#loader { position: fixed; inset: 0; background: rgba(26,84,48,0.98); z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: var(--bebas); }
#loader.on { display: flex; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="loader" class="on">
    <div style="width:50px;height:50px;border:5px solid rgba(255,255,255,0.1);border-top-color:#6be082;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <div style="font-size:22px; margin-top:20px; letter-spacing:3px;">PROCESANDO SOLAPA...</div>
</div>

<header>
    <div class="brand-name">BIG <span>SALADS</span> SEXTA</div>
    <button style="background:#fff; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-family:var(--mono); font-size:10px;" onclick="fullRefresh()">REFRESCAR</button>
</header>

<div class="tabs-wrap">
    <button class="tab" id="btnResumen" onclick="changeTab('Hoja 1')">RESUMEN DEL DÍA</button>
    <button class="tab" id="btnHistorico" onclick="changeTab('Historico')">HISTÓRICO</button>
</div>

<main>
    <div class="kpi-grid">
        <div class="kpi"><div style="font-size:10px; color:var(--muted); font-family:var(--mono);">VENTAS TOTALES</div><div class="kpi-val" id="kTotal"><span class="u">$</span>0</div></div>
        <div class="kpi"><div style="font-size:10px; color:var(--muted); font-family:var(--mono);">MARGEN NETO</div><div class="kpi-val" id="kMargen"><span class="u">$</span>0</div></div>
        <div class="kpi" data-c="yellow"><div style="font-size:10px; color:var(--muted); font-family:var(--mono);">TICKET PROMEDIO</div><div class="kpi-val" id="kAvg"><span class="u">$</span>0</div></div>
    </div>

    <div class="chart-row">
        <div class="card"><div class="card-head">📍 ORIGEN</div><div style="padding:20px;"><canvas id="chartOrigen" height="150"></canvas></div></div>
        <div class="card"><div class="card-head">🌙 TURNOS</div><div style="padding:20px;"><canvas id="chartTurno" height="150"></canvas></div></div>
        <div class="card"><div class="card-head">💳 MEDIOS DE PAGO</div><div style="padding:20px;" id="payList"></div></div>
    </div>

    <div id="sectionHistorico" style="display:none;">
        <div class="card">
            <div class="card-head">EVOLUCIÓN MENSUAL (ÚLTIMOS 6 MESES)</div>
            <div style="padding:20px;">
                <div class="month-grid" id="monthGrid"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-head" id="tableTitle">DETALLE DE LA HOJA</div>
        <div class="tscroll">
            <table id="mainTable">
                <thead><tr id="tHead"></tr></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
const PUB_ID = '2PACX-1vSqXw7W2kUj_BsUyLKYmRIIZyYacKR9nYbaeXRFqSPzBVZuyCuj7Vl_Cf13tTTJAq9jGVXudNqWfiiC';
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let currentTab = 'Hoja 1';
let charts = {};

const fmt = n => new Intl.NumberFormat('es-AR',{maximumFractionDigits:0}).format(Math.round(n));
const parseN = s => {
    if(!s) return 0;
    let n = parseFloat(String(s).replace(/[^\d.,\-]/g,'').replace(',','.'));
    return isNaN(n) ? 0 : n;
};

async function changeTab(name) {
    currentTab = name;
    await fullRefresh();
}

async function fullRefresh() {
    document.getElementById('loader').classList.add('on');
    
    // Forzamos actualización de estilos de botones
    document.getElementById('btnResumen').className = `tab ${currentTab === 'Hoja 1' ? 'active' : ''}`;
    document.getElementById('btnHistorico').className = `tab ${currentTab === 'Historico' ? 'active' : ''}`;

    // URL específica por solapa para forzar a Google a enviar los datos correctos
    const url = `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?output=csv&sheet=${encodeURIComponent(currentTab)}&_=${Date.now()}`;
    
    try {
        const r = await fetch(url);
        const text = await r.text();
        const rows = text.split('\n').map(row => {
            let cells = []; let inQ = false; let cur = '';
            for(let c of row) { if(c === '"') inQ = !inQ; else if(c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; } else cur += c; }
            cells.push(cur.trim()); return cells;
        }).filter(r => r.length > 1);

        renderData(rows);
    } catch(e) { alert("Error al conectar con la solapa " + currentTab); }
    
    document.getElementById('loader').classList.remove('on');
}

function renderData(data) {
    const headers = data[0].map(h => h.toLowerCase().trim());
    const rows = data.slice(1);

    const idx = { 
        total: headers.indexOf('total'), margen: headers.indexOf('margen neto'), 
        fecha: headers.indexOf('fecha'), origen: headers.indexOf('origen'), 
        turno: headers.indexOf('turno'), medio: headers.indexOf('medio de pago')
    };

    // UI Reset
    document.getElementById('sectionHistorico').style.display = currentTab === 'Historico' ? 'block' : 'none';
    document.getElementById('tableTitle').innerText = `LISTADO: ${currentTab.toUpperCase()}`;

    let sumV = 0, sumM = 0;
    const oD = {}, tD = {}, mD = {}, mensual = {};

    rows.forEach(r => {
        const v = parseN(r[idx.total]);
        sumV += v;
        sumM += parseN(r[idx.margen]);

        // Distribución
        let o = r[idx.origen] || 'Local'; oD[o] = (oD[o]||0) + v;
        let t = r[idx.turno] || 'N/A'; tD[t] = (tD[t]||0) + v;
        let m = r[idx.medio] || 'Otro'; if(!mD[m]) mD[m]={s:0,c:0}; mD[m].s += v; mD[m].c++;

        // Mensual (Solo si es Historico)
        if(currentTab === 'Historico') {
            const f = r[idx.fecha] || '';
            const p = f.split('/');
            if(p.length === 3) {
                const k = `${p[2]}-${p[1].padStart(2,'0')}`;
                if(!mensual[k]) mensual[k] = { s:0, t:0, d:new Set(), l:`${MESES[parseInt(p[1])-1]} ${p[2]}` };
                mensual[k].s += v; mensual[k].t++; mensual[k].d.add(p[0]);
            }
        }
    });

    // KPIs
    document.getElementById('kTotal').innerText = `$${fmt(sumV)}`;
    document.getElementById('kMargen').innerText = `$${fmt(sumM)}`;
    document.getElementById('kAvg').innerText = `$${fmt(sumV/rows.length)}`;

    // Charts
    updateChart('chartOrigen', 'doughnut', Object.keys(oD), Object.values(oD));
    updateChart('chartTurno', 'bar', Object.keys(tD), Object.values(tD));

    // PayList
    document.getElementById('payList').innerHTML = Object.entries(mD).sort((a,b)=>b[1].s-a[1].s).map(e => `
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:4px;">
            <span>${e[0]} (${e[1].c})</span><b>$${fmt(e[1].s)}</b>
        </div>`).join('');

    // Grid Mensual
    if(currentTab === 'Historico') {
        const keys = Object.keys(mensual).sort().reverse();
        document.getElementById('monthGrid').innerHTML = keys.map(k => `
            <div class="mc">
                <div style="font-family:var(--bebas); font-size:18px; color:var(--green-dark);">${mensual[k].l}</div>
                <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:13px;"><span>Ventas:</span><b>$${fmt(mensual[k].s)}</b></div>
                <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--orange);"><span>Tickets/Día:</span><b>${(mensual[k].t/mensual[k].d.size).toFixed(1)}</b></div>
            </div>`).join('');
    }

    // Tabla
    document.getElementById('tHead').innerHTML = data[0].map(h => `<th>${h}</th>`).join('');
    document.getElementById('tBody').innerHTML = rows.slice(-150).reverse().map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
}

function updateChart(id, type, labels, data) {
    if(charts[id]) charts[id].destroy();
    charts[id] = new Chart(document.getElementById(id), {
        type, data: { labels, datasets: [{ data, backgroundColor: ['#2a7d40','#e05a1a','#f5c030','#3a9e52','#5dbf72'] }] },
        options: { plugins: { legend: { display: type==='doughnut', position: 'bottom' } } }
    });
}

fullRefresh();
</script>
</body>
</html>
