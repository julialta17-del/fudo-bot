<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIG SALADS SEXTA · Dashboard Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0ede6; --bg1: #e8e4db; --white: #ffffff; --card: #ffffff;
  --green: #2a7d40; --green2: #3a9e52; --green3: #5dbf72; --green-bg: #e8f5ec; --green-dark: #1a5430;
  --orange: #e05a1a; --orange-bg: #fef0e8; --yellow: #f5c030; --yellow-bg: #fef8e0;
  --red: #d94040; --red-bg: #fde8e8; --text: #1a2e1e; --text2: #3a5040;
  --muted: #7a9a82; --border: #c8dcc8; --border2: #a8c8a8;
  --shadow: 0 2px 12px rgba(42,125,64,0.08); --shadow-lg: 0 8px 32px rgba(42,125,64,0.12);
  --bebas: 'Bebas Neue', cursive; --sans: 'Outfit', sans-serif; --mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 400; min-height: 100vh; }

header { position: sticky; top: 0; z-index: 100; background: var(--green-dark); padding: 0 36px; display: flex; align-items: center; justify-content: space-between; height: 68px; box-shadow: 0 2px 20px rgba(0,0,0,0.2); }
.brand { display: flex; align-items: center; gap: 14px; }
.brand-logo { width: 42px; height: 42px; border-radius: 10px; background: var(--green2); display: flex; align-items: center; justify-content: center; font-size: 22px; border: 2px solid rgba(255,255,255,0.2); }
.brand-name { font-family: var(--bebas); font-size: 26px; letter-spacing: 2px; color: #ffffff; line-height: 1; }
.brand-name span { color: var(--green3); }

.tabs-wrap { background: var(--green-dark); border-bottom: 3px solid rgba(255,255,255,0.08); padding: 0 36px; display: flex; gap: 2px; overflow-x: auto; }
.tab { padding: 11px 18px 9px; font-family: var(--bebas); font-size: 14px; letter-spacing: 1.5px; color: rgba(255,255,255,0.45); cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; transition: all 0.15s; white-space:nowrap; }
.tab.active { color:#fff; border-bottom-color: var(--green3); background: rgba(255,255,255,0.05); }

/* BARRA DE FILTROS */
.filter-bar { background: var(--white); padding: 12px 36px; display: none; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; box-shadow: var(--shadow); }
.filter-bar.active { display: flex; }
.filter-group { display: flex; align-items: center; gap: 10px; }
.filter-group label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.filter-group input, .filter-group select { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border2); font-family: var(--sans); font-size: 13px; color: var(--text); background: var(--bg); }

main { padding: 28px 36px 60px; max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; gap: 28px; }
.kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.kpi { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 20px 18px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.kpi-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.kpi-val { font-family: var(--bebas); font-size: 40px; color: var(--text); margin: 4px 0 2px; }
.card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
.card-head { padding: 18px 22px 14px; border-bottom: 1px solid var(--bg1); display: flex; justify-content: space-between; align-items: flex-start; }
.card-title { font-family: var(--bebas); font-size: 20px; letter-spacing: 1.5px; color: var(--green-dark); }
.chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }

#loader { position: fixed; inset: 0; background: rgba(26, 84, 48, 0.9); z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
#loader.on { display: flex; }
.loader-ring { width: 48px; height: 48px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.15); border-top-color: #6be082; animation: rotate 0.75s linear infinite; }
@keyframes rotate { to { transform:rotate(360deg); } }

table { width:100%; border-collapse:collapse; }
thead th { padding:9px 14px; background:var(--bg1); font-family:var(--mono); font-size:9px; color:var(--muted); text-align:left; }
tbody td { padding:9px 14px; font-size:12px; border-bottom:1px solid var(--bg1); }

@media(max-width:900px){ .kpi-grid, .chart-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="loader" class="on">
  <div class="loader-ring"></div>
  <div class="loader-txt" style="color:white; font-family:var(--bebas)">BIG ESTA COCINANDO…</div>
</div>

<header>
  <div class="brand">
    <div class="brand-logo">🥗</div>
    <div class="brand-name">BIG <span>SALADS</span> SEXTA</div>
  </div>
  <button class="btn btn-white" onclick="fullRefresh()">ACTUALIZAR</button>
</header>

<div class="tabs-wrap" id="tabsWrap"></div>

<div class="filter-bar" id="filterBar">
  <div class="filter-group">
    <label>Desde</label>
    <input type="date" id="fDesde" onchange="renderAll()">
  </div>
  <div class="filter-group">
    <label>Hasta</label>
    <input type="date" id="fHasta" onchange="renderAll()">
  </div>
  <div class="filter-group">
    <label>Origen</label>
    <select id="fOrigen" onchange="renderAll()">
      <option value="TODOS">TODOS LOS CANALES</option>
      <option value="Local">LOCAL</option>
      <option value="Pedidos Ya">PEDIDOS YA</option>
    </select>
  </div>
</div>

<main>
  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-lbl">VENTAS TOTALES</div>
      <div class="kpi-val" id="kTotal">$—</div>
      <div id="kTotalSub" style="font-size:10px; color:var(--muted)">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">MARGEN NETO</div>
      <div class="kpi-val" id="kMargen" style="color:var(--green)">$—</div>
      <div id="kMargenSub" style="font-size:10px; color:var(--muted)">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">TICKET PROMEDIO</div>
      <div class="kpi-val" id="kAvgTicket">$—</div>
      <div id="kTickets" style="font-size:10px; color:var(--muted)">— ventas</div>
    </div>
  </div>

  <div class="chart-row">
    <div class="card">
      <div class="card-head"><div class="card-title">EVOLUCIÓN DE VENTAS</div></div>
      <div style="padding:20px"><canvas id="chartMain" height="280"></canvas></div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">DISTRIBUCIÓN ORIGEN</div></div>
      <div style="padding:20px"><canvas id="chartOrigen" height="280"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-title">DETALLE DE OPERACIONES</div></div>
    <div style="overflow-x:auto; max-height:400px">
      <table><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
    </div>
  </div>
</main>

<script>
const PUB_ID = '2PACX-1vSqXw7W2kUj_BsUyLKYmRIIZyYacKR9nYbaeXRFqSPzBVZuyCuj7Vl_Cf13tTTJAq9jGVXudNqWfiiC';
let sheets = [];
let active = 'Hoja 1';
let charts = {};

const $ = id => document.getElementById(id);
const fmt = n => new Intl.NumberFormat('es-AR', {style:'currency', currency:'ARS', maximumFractionDigits:0}).format(n);

// Helper para parsear fecha DD/MM/YYYY
function parseFecha(s) {
  if(!s) return null;
  const p = s.split('/');
  if(p.length < 3) return new Date(s);
  return new Date(p[2], p[1]-1, p[0]);
}

async function loadSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?output=csv&sheet=${encodeURIComponent(name)}&_=${Date.now()}`;
  const r = await fetch(url);
  const txt = await r.text();
  const rows = txt.split('\n').map(line => {
    const res = []; let cur = '', inQ = false;
    for(let c of line) {
      if(c==='"') inQ=!inQ;
      else if(c===',' && !inQ) { res.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    res.push(cur.trim()); return res;
  });
  return { name, headers: rows[0], rows: rows.slice(1).filter(r => r.length > 5) };
}

function renderAll() {
  const sheet = sheets.find(s => s.name === active);
  if(!sheet) return;

  const h = sheet.headers;
  let rows = sheet.rows;

  const idx = {
    fecha: h.findIndex(x => x === 'Fecha'),
    total: h.findIndex(x => x === 'Total'),
    margen: h.findIndex(x => x === 'Margen_Neto_$'),
    origen: h.findIndex(x => x === 'Origen')
  };

  // ACTIVAR FILTROS SOLO EN HISTORICO
  if(active === 'Historico') {
    $('filterBar').classList.add('active');
    const desde = $('fDesde').value ? new Date($('fDesde').value + "T00:00:00") : null;
    const hasta = $('fHasta').value ? new Date($('fHasta').value + "T23:59:59") : null;
    const origen = $('fOrigen').value;

    rows = rows.filter(r => {
      const f = parseFecha(r[idx.fecha]);
      const mFecha = (!desde || f >= desde) && (!hasta || f <= hasta);
      const mOrigen = (origen === 'TODOS' || r[idx.origen] === origen);
      return mFecha && mOrigen;
    });
  } else {
    $('filterBar').classList.remove('active');
  }

  // KPIs
  const total = rows.reduce((a,b) => a + (parseFloat(b[idx.total]) || 0), 0);
  const margen = rows.reduce((a,b) => a + (parseFloat(b[idx.margen]) || 0), 0);
  
  $('kTotal').textContent = fmt(total);
  $('kMargen').textContent = fmt(margen);
  $('kAvgTicket').textContent = fmt(total / (rows.length || 1));
  $('kTickets').textContent = `${rows.length} ventas registradas`;
  $('kMargenSub').textContent = `${((margen/total)*100 || 0).toFixed(1)}% de rentabilidad`;

  // TABLA
  $('tHead').innerHTML = `<tr>${h.map(x => `<th>${x}</th>`).join('')}</tr>`;
  $('tBody').innerHTML = rows.slice(-50).reverse().map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');

  renderCharts(rows, idx);
}

function renderCharts(rows, idx) {
  // Gráfico Evolución
  const etiquetas = rows.slice(-20).map(r => r[idx.fecha]);
  const valores = rows.slice(-20).map(r => parseFloat(r[idx.total]) || 0);

  if(charts.main) charts.main.destroy();
  charts.main = new Chart($('chartMain'), {
    type: 'line',
    data: { labels: etiquetas, datasets: [{ label: 'Ventas $', data: valores, borderColor: '#2a7d40', tension: 0.3, fill: true, backgroundColor: 'rgba(42,125,64,0.1)' }] },
    options: { responsive: true, maintainAspectRatio: false }
  });

  // Gráfico Origen
  const dist = {};
  rows.forEach(r => { const o = r[idx.origen] || 'Otros'; dist[o] = (dist[o] || 0) + (parseFloat(r[idx.total]) || 0); });
  
  if(charts.origen) charts.origen.destroy();
  charts.origen = new Chart($('chartOrigen'), {
    type: 'doughnut',
    data: { labels: Object.keys(dist), datasets: [{ data: Object.values(dist), backgroundColor: ['#1a5430', '#3a9e52', '#e05a1a', '#f5c030'] }] },
    options: { responsive: true, maintainAspectRatio: false }
  });
}

async function fullRefresh() {
  $('loader').classList.add('on');
  try {
    const h1 = await loadSheet('Hoja 1');
    const hist = await loadSheet('Historico');
    sheets = [h1, hist];
    
    $('tabsWrap').innerHTML = sheets.map(s => `
      <button class="tab ${active === s.name ? 'active' : ''}" onclick="active='${s.name}'; renderAll(); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); this.classList.add('active');">
        ${s.name.toUpperCase()}
      </button>
    `).join('');
    
    renderAll();
  } catch(e) { alert("Error al cargar datos."); }
  $('loader').classList.remove('on');
}

window.onload = fullRefresh;
</script>
</body>
</html>
